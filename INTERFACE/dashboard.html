<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING DIADEM</title>

<link rel="manifest" href="/manifest.json">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

header{
background:#000;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
margin-top:30px;
}

textarea{
width:90%;
height:120px;
font-size:16px;
padding:10px;
}

button{
padding:12px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.result{
margin-top:20px;
background:white;
padding:20px;
width:90%;
margin-left:auto;
margin-right:auto;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>
KING DIADEM
</header>

<div class="container">

<h2>Reality Optimization System</h2>

<textarea id="input"
placeholder="Describe your situation..."></textarea>

<br>

<button onclick="runDecision()">
Run Decision Engine
</button>

<div class="result" id="output">

System Ready

</div>

</div>

<script>

async function runDecision(){

let text=document.getElementById("input").value

let response=await fetch("/decision",{

method:"POST",

headers:{
"Content-Type":"application/json",
"api-key":"demo-key"
},

body:JSON.stringify({

location:"global",
food:text,
money:0,
risk:"unknown"

})

})

let data=await response.json()

document.getElementById("output").innerText=
JSON.stringify(data,null,2)

}

</script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('/service_worker.js')

}

</script>

</body>
</html>
