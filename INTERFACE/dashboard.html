<!DOCTYPE html><html>
<head><title>KING DIADEM Control Room</title><style>

body{
background:#0a0a0a;
color:#eaeaea;
font-family:monospace;
margin:0;
}

.header{
padding:20px;
font-size:28px;
border-bottom:1px solid #333;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#121212;
padding:20px;
border-radius:8px;
border:1px solid #333;
}

button{
background:#1e88ff;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-top:5px;
background:#1b1b1b;
border:1px solid #333;
color:white;
}

.result{
margin-top:10px;
background:#000;
padding:10px;
}

</style></head><body><div class="header">
👑 KING DIADEM Control Room
</div><div class="container"><div class="panel"><h3>Business Analysis</h3><label>Revenue</label>
<input id="rev">

<label>Cost</label>
<input id="cost">

<label>Market Growth</label>
<input id="growth">

<label>Competition</label>
<input id="comp">

<label>Demand</label>
<input id="demand">

<button onclick="runBusiness()">Analyze</button>

<div id="business_result" class="result"></div></div><div class="panel"><h3>System Status</h3><button onclick="loadSystem()">Load Status</button>

<div id="system_result" class="result"></div></div></div><script>

async function loadSystem(){

const r = await fetch("/system")

const d = await r.json()

document.getElementById("system_result").innerText =
JSON.stringify(d,null,2)

}

async function runBusiness(){

const body = {

revenue:parseFloat(document.getElementById("rev").value),
cost:parseFloat(document.getElementById("cost").value),
market_growth:parseFloat(document.getElementById("growth").value),
competition:parseFloat(document.getElementById("comp").value),
demand:parseFloat(document.getElementById("demand").value)

}

const r = await fetch("/analyze-business",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(body)

})

const d = await r.json()

document.getElementById("business_result").innerText =
JSON.stringify(d,null,2)

}

</script></body>
</html>
