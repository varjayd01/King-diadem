<script>

async function askDecision(){

const location=document.getElementById("location").value
const food=document.getElementById("food").value
const money=parseInt(document.getElementById("money").value)
const risk=document.getElementById("risk").value

const res=await fetch("/simulate",{
method:"POST",
headers:{
"Content-Type":"application/json",
"api-key":"kd_test"
},
body:JSON.stringify({
location:location,
food:food,
money:money,
risk:risk
})
})

const data=await res.json()

document.getElementById("result").innerHTML=

"<b>Best Action</b><br>"+data.best_action+

"<br><br><b>Score</b><br>"+data.score+

"<br><br><b>Alternatives</b><br>"+

data.alternatives.map(a=>a.action+" ("+a.expected_score+")").join("<br>")

}



async function loadMap(){

const res=await fetch("/world")
const data=await res.json()

document.getElementById("result").innerHTML=
"<pre>"+JSON.stringify(data,null,2)+"</pre>"

}



function foodBalance(){

document.getElementById("result").innerHTML=

"Upload meal photo coming soon.<br><br>"+

"System will estimate calories, sodium and suggest steps or water intake."

}

</script>
