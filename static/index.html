<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING DIADEM</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
}

.center{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;

}

.title{
font-size:40px;
}

.quote{

max-width:500px;
opacity:0.8;
margin-top:20px;

}

</style>

</head>

<body>

<canvas id="space"></canvas>

<div class="center">

<div class="title">👑 KING DIADEM</div>

<div class="quote">

ระบบใดที่ทำให้ทางเลือกของมนุษย์ = 0  
ระบบนั้นล้มเหลว  

<br><br>

KING DIADEM  
จะทำให้คุณมีทางเลือกเสมอ  
แม้ในวันที่คุณมองไม่เห็นมัน

</div>

</div>

<script>

const canvas=document.getElementById("space")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<400;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let s of stars){

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

}

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
