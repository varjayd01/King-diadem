<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KING DIADEM</title>

<style>

/* 🌌 GLOBAL */
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;

    background:
        radial-gradient(circle at 20% 50%, rgba(255,80,0,0.25), transparent 40%),
        radial-gradient(circle at 80% 50%, rgba(0,150,255,0.25), transparent 40%),
        radial-gradient(circle at center, #000000 30%, #020617 100%);

    font-family: monospace;
    color: #cdefff;
}

/* ⭐ CANVAS */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* 🌫 DEPTH */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,255,0.05), transparent);
    z-index: -1;
}

/* 🌌 ORBIT */
.orbit-system {
    position: absolute;
    top: -140px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
}

.ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.ring1 {
    border: 1px solid rgba(255,120,0,0.4);
    box-shadow: 0 0 25px rgba(255,120,0,0.4);
    animation: spin 18s linear infinite;
}

.ring2 {
    border: 1px dashed rgba(0,150,255,0.4);
    box-shadow: 0 0 25px rgba(0,150,255,0.4);
    animation: spinReverse 25s linear infinite;
}

.sun {
    width: 14px;
    height: 14px;
    background: radial-gradient(circle, #ff6a00, #ff0000);
    box-shadow: 0 0 20px #ff6a00;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
}

.planet {
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #00ccff, #0044ff);
    box-shadow: 0 0 15px #00ccff;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes spinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 440px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(0,0,0,0.75);

    box-shadow:
        0 0 80px rgba(0,255,255,0.35),
        inset 0 0 30px rgba(0,255,255,0.1);

    backdrop-filter: blur(15px);
    position: relative;
}

/* TITLE */
h1 {
    font-size: 36px;
    background: linear-gradient(90deg,#ffd27f,#66ccff,#9999ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    font-size: 12px;
    color: #ffd27f;
}

.status {
    color: #ff5e5e;
    margin-bottom: 15px;
}

input {
    width: 92%;
    padding: 12px;
    background: rgba(0,0,0,0.9);
    border: 1px solid #00ccff;
    color: #cdefff;
}

button {
    margin-top: 12px;
    padding: 12px 20px;
    background: linear-gradient(90deg,#ffd700,#ff9966);
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px #ffd700;
}

pre {
    margin-top: 15px;
    text-align: left;
    background: black;
    padding: 12px;
    border: 1px solid #00ccff;
    height: 150px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.box {
    padding: 10px;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
<div class="card">

<div class="orbit-system">
    <div class="ring ring1"><div class="sun"></div></div>
    <div class="ring ring2"><div class="planet"></div></div>
</div>

<h1>King Diadem</h1>
<div class="sub">Decision Engine Core</div>
<div class="status">❌ เครดิตหมด (AI ถูกจำกัด)</div>

<input id="input" placeholder="พิมพ์สถานการณ์...">
<br>
<button onclick="run()">RUN DECISION ENGINE</button>

<pre id="output">System Ready</pre>

<div class="grid">
    <div class="box">🧠 Choice Engine</div>
    <div class="box">⚖️ Risk Engine</div>
    <div class="box">🛡 Survival Engine</div>
    <div class="box">🔗 Cooperation Engine</div>
</div>

</div>
</div>

<script>

/* 🌌 ULTRA STAR SYSTEM */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];

for (let i = 0; i < 400; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2.5,
        speed: Math.random() * 0.4 + 0.05,
        alpha: Math.random(),
        flicker: Math.random() * 0.05,
        drift: (Math.random() - 0.5) * 0.4,
        color: Math.random()
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let s of stars){

        s.alpha += s.flicker;
        if(s.alpha > 1 || s.alpha < 0) s.flicker *= -1;

        s.y += s.speed;
        s.x += s.drift;

        if(s.y > canvas.height) s.y = 0;
        if(s.x > canvas.width) s.x = 0;
        if(s.x < 0) s.x = canvas.width;

        let c;
        if(s.color < 0.33) c = "255,255,255";
        else if(s.color < 0.66) c = "0,200,255";
        else c = "255,120,0";

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fillStyle = `rgba(${c},${s.alpha})`;
        ctx.fill();
    }

    requestAnimationFrame(drawStars);
}

drawStars();

/* ENGINE */
async function run(){
    const text = document.getElementById("input").value;
    document.getElementById("output").innerText = "Running...";

    const res = await fetch("/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({input:text})
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data,null,2);
}

</script>

</body>
</html>
