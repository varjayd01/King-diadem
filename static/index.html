<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>KING DIADEM</title>

<style>

body{

background:#030312;

color:white;

font-family:Arial;

text-align:center;

}

canvas{

border:1px solid #111;

margin-top:20px;

}

input{

padding:10px;

width:300px;

}

button{

padding:10px 20px;

}

#chat{

margin-top:40px;

}

</style>

</head>

<body>

<h1>KING DIADEM</h1>

<p>

ระบบใดที่ทำให้ทางเลือกของมนุษย์ = 0  
ระบบนั้นล้มเหลว

</p>

<p>

Any system that reduces human choice to zero is a failed system

</p>


<input id="question" placeholder="Ask a strategic question">

<button onclick="ask()">ASK</button>

<div id="thinking"></div>


<canvas id="galaxyDecision" width="900" height="400"></canvas>


<script src="/static/galaxy_decision.js"></script>


<script>

function ask(){

let q=document.getElementById("question").value

document.getElementById("thinking").innerText="AI Council thinking..."

fetch("/decision",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

question:q

})

})

.then(r=>r.json())

.then(data=>{

drawGalaxy(

data.problem,

data.options.map(o=>({

strategy:o,

risk:Math.random(),

confidence:Math.random()

}))

)

document.getElementById("thinking").innerText=""

})

}

</script>


<hr>


<div id="chat">

<h2>Global Decision Network</h2>

<div id="messages"></div>

<input id="user" placeholder="name">

<input id="msg" placeholder="message">

<button onclick="sendMsg()">send</button>

</div>


<script>

function sendMsg(){

let u=document.getElementById("user").value

let m=document.getElementById("msg").value

fetch("/world/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

user:u,

message:m

})

})

}

function loadChat(){

fetch("/world/messages")

.then(r=>r.json())

.then(data=>{

let box=document.getElementById("messages")

box.innerHTML=""

data.forEach(m=>{

let d=document.createElement("div")

d.innerText=m.user+" : "+m.message

box.appendChild(d)

})

})

}

setInterval(loadChat,2000)

</script>


</body>

</html>
