<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>KING DIADEM</h1>

    <textarea id="input" placeholder="พิมพ์คำถามของคุณ..."></textarea>

    <div class="controls">
        <label>Energy</label>
        <input type="range" id="energy" min="0" max="100" value="50">

        <label><input type="checkbox" id="food" checked> Food</label>
        <label><input type="checkbox" id="safe" checked> Safe</label>

        <select id="mode">
            <option>Stable</option>
            <option>Risk</option>
            <option>Critical</option>
        </select>
    </div>

    <button onclick="run()">RUN DECISION ENGINE</button>

    <div class="output">
        <p><b>AI:</b></p>
        <div id="result">...</div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
