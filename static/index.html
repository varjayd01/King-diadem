<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
font-family:Arial;
background:url('/static/hero.jpg') center/cover;
color:white;
text-align:center;
}

/* glass */
.box{
background:rgba(0,0,0,0.6);
padding:20px;
margin:20px;
border-radius:15px;
}

/* input */
input,textarea{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}

/* button */
button{
padding:10px;
background:#5b7cff;
border:none;
color:white;
border-radius:8px;
}

</style>
</head>

<body>

<div class="box">

<img src="/static/logo.png" width="100">

<h1>KING DIADEM</h1>

<input id="q" placeholder="ถามสิ่งที่คุณเจอ">
<br>
<button onclick="ask()">ASK</button>

<div id="res"></div>

</div>

<!-- 📒 SYSTEM -->
<div class="box">

<h2>📒 Life System</h2>

<textarea id="note"></textarea>
<button onclick="process()">สรุป</button>

<div id="out"></div>

</div>

<!-- ⚙️ SETTINGS -->
<div class="box">

<h2>⚙️ Persona</h2>

<input id="name" placeholder="ชื่อ">
<input id="style" placeholder="โทน เช่น สนุก / ลึก">

<button onclick="save()">Save</button>

</div>

<script src="/static/app.js"></script>

</body>
</html>
