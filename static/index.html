<!DOCTYPE html>
<html>
<head>
  <title>KING DIADEM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">KING DIADEM</h1>

<textarea id="text" placeholder="Reality input..."></textarea><br>

<label>Energy</label>
<input type="range" id="energy" min="0" max="100" value="50"><br>

<label><input type="checkbox" id="food" checked> Food</label>
<label><input type="checkbox" id="safe" checked> Safe</label>

<br><br>

<select id="mental">
  <option value="stable">Stable</option>
  <option value="stressed">Stressed</option>
  <option value="overwhelmed">Overwhelmed</option>
</select>

<br><br>

<button onclick="run()">RUN RUNTIME GATES</button>

<div class="result" id="output"></div>

<script src="app.js"></script>
</body>
</html>
