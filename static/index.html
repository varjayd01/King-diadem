<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#000510">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/favicon.ico">
    <title>KING DIADEM — Adaptive DriftZero OS</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;600&display=swap');

        :root {
            --gold: #c8a96e;
            --gold-bright: #ffd27f;
            --cyan: #00d4ff;
            --bg: #000510;
            --border: rgba(0,212,255,0.12);
            --text: #a8d4e8;
            --text-bright: #cdefff;
            --panel-bg: rgba(0, 5, 16, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; height: 100%; 
            background: #000; 
            font-family: 'Rajdhani', sans-serif; 
            color: var(--text); 
            overflow: hidden; 
        }

        /* --- BACKGROUND LAYER --- */
        #galaxy-3d { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .nebula { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, rgba(0,100,255,0.05) 0%, transparent 80%); }
        .scanline { position: fixed; inset: 0; z-index: 2; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.01) 2px, rgba(0,212,255,0.01) 4px); }

        /* --- CORE APP GRID --- */
        #app {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 240px 1fr 280px;
            grid-template-rows: 60px 1fr 40px;
            height: 100vh;
        }

        /* --- TOPBAR --- */
        #topbar {
            grid-column: 1/-1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-bright), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sys-badge {
            font-family: 'Share Tech Mono'; font-size: 9px; padding: 2px 8px; border: 1px solid; border-radius: 2px;
        }
        .sys-badge.ok { border-color: #00ff88; color: #00ff88; }
        .sys-badge.off { border-color: #ff5e5e; color: #ff5e5e; }

        /* --- SIDE PANELS (Desktop Default) --- */
        #left-panel, #right-panel {
            background: rgba(0,5,16,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .engine-btn {
            display: flex; align-items: center; gap: 10px; width: 100%;
            padding: 12px; background: transparent; border: none;
            color: var(--text); border-left: 2px solid transparent;
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .engine-btn.active { background: rgba(0,212,255,0.05); border-left-color: var(--gold); color: var(--gold-bright); }

        /* --- CENTER: GEMINI STYLE CHAT --- */
        #center { display: flex; flex-direction: column; overflow: hidden; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg-text {
            max-width: 85%; padding: 12px 18px; border-radius: 18px;
            font-size: 14px; line-height: 1.6;
            background: rgba(0, 8, 20, 0.8); border: 1px solid rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .msg-user { align-self: flex-end; border-color: var(--gold); color: var(--gold-bright); }
        .msg-system { align-self: flex-start; }

        /* --- ADAPTIVE MOBILE OVERRIDE --- */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; grid-template-rows: 60px 1fr auto; }
            #left-panel, #right-panel {
                position: fixed; top: 60px; height: calc(100% - 110px);
                width: 80%; left: -100%; z-index: 100; transition: 0.4s ease;
            }
            #left-panel.active { left: 0; }
            #right-panel.active { right: 0; left: auto; }
            
            #input-area {
                position: sticky; bottom: 0; width: 100%;
                background: linear-gradient(to top, var(--bg) 80%, transparent);
                padding: 10px 15px 30px; z-index: 50;
            }
            .mobile-btn { display: block !important; }
        }

        .mobile-btn { display: none; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* --- INPUT INTERFACE --- */
        .input-box {
            display: flex; align-items: flex-end; gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 8px 16px; border: 1px solid var(--border);
        }
        #main-input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 10px 0; outline: none; font-size: 15px; resize: none;
            max-height: 120px;
        }
        #run-btn {
            background: var(--gold); border: none; width: 36px; height: 36px;
            border-radius: 50%; color: #000; cursor: pointer; flex-shrink: 0; font-weight: bold;
        }

        /* --- WATERLINE METER --- */
        .wl-meter { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin: 8px 0; overflow: hidden; }
        .wl-fill { height: 100%; background: var(--cyan); transition: width 0.8s; }
    </style>
</head>
<body>

<div id="galaxy-3d"></div>
<div class="nebula"></div>
<div class="scanline"></div>

<div id="app">
    <header id="topbar">
        <button class="mobile-btn" onclick="toggleP('left')">ROUTES</button>
        <div class="logo-text">KING DIADEM</div>
        <button class="mobile-btn" onclick="toggleP('right')">STATS ❯</button>
        <div class="topbar-right" id="desktop-health" style="display: flex; gap: 5px;">
            <span class="sys-badge off" id="b-ai">AI —</span>
            <span class="sys-badge off" id="b-eng">ENG —</span>
            <span class="sys-badge off" id="b-lyla">LYLA —</span>
        </div>
    </header>

    <nav id="left-panel">
        <h3 style="font-size: 10px; color: var(--cyan); margin-bottom: 15px;">GOVERNANCE ROUTES</h3>
        <button class="engine-btn active" id="btn-general" onclick="setR('general')">◈ Choice Engine</button>
        <button class="engine-btn" id="btn-risk" onclick="setR('risk')">⊘ Risk Engine</button>
        <button class="engine-btn" id="btn-survival" onclick="setR('survival')">◉ Survival Engine</button>
        <button class="engine-btn" id="btn-vega" onclick="setR('vega')">★ Vega Engine</button>
        
        <div style="margin-top: 30px;">
            <p style="font-size: 10px; opacity: 0.5;">ENTROPY LEVEL</p>
            <div class="wl-meter"><div id="wl-entropy" class="wl-fill" style="width: 40%;"></div></div>
            <p id="wl-val" style="font-size: 10px; color: var(--cyan);">40.0</p>
        </div>
    </nav>

    <main id="center">
        <div id="chat-area">
            <div id="welcome" style="text-align: center; margin-top: 100px; opacity: 0.4;">
                <h2 style="font-family: 'Cinzel';">Welcome, Operator</h2>
                <p>KING DIADEM DriftZero OS Is Active</p>
            </div>
        </div>

        <div id="input-area">
            <div class="input-box">
                <textarea id="main-input" placeholder="พิมพ์สถานการณ์ของคุณ..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button id="run-btn" onclick="run()">↑</button>
            </div>
        </div>
    </main>

    <aside id="right-panel">
        <div class="rp-section" style="margin-bottom: 20px;">
            <p style="font-size: 10px; color: var(--cyan);">LYLA KERNEL STATUS</p>
            <div style="padding: 10px; background: rgba(0,0,0,0.4); margin-top: 5px;">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>STABILITY</span><span id="st-val" style="color: #00ff88;">NOMINAL</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px;">
                    <span>DRIFT</span><span id="dr-val">0.00%</span>
                </div>
            </div>
        </div>

        <div class="rp-section">
            <p style="font-size: 10px; color: #7b2fff;">FUTURE SIMULATION</p>
            <div id="sim-paths" style="margin-top: 8px;">
                <input type="text" value="ดำเนินการตามแผน A" style="width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 6px; font-size: 11px; margin-bottom: 5px;">
            </div>
            <button onclick="simulate()" style="width: 100%; background: rgba(123,47,255,0.2); border: 1px solid #7b2fff; color: #fff; padding: 6px; font-size: 9px; cursor: pointer;">◈ RUN SIMULATION</button>
        </div>

        <div class="rp-section" style="margin-top: 20px;">
            <p style="font-size: 10px; color: var(--gold);">CREDIT & ANALYTICS</p>
            <button onclick="stripeCheckout()" style="width: 100%; background: #635bff; color: #fff; border: none; padding: 8px; font-size: 10px; margin-top: 5px; cursor: pointer;">⚡ TOP UP STRIPE</button>
            <input type="file" id="photo-file" style="font-size: 10px; margin-top: 10px; width: 100%;">
            <button onclick="uploadImage()" style="width: 100%; background: var(--cyan); color: #000; border: none; padding: 6px; font-size: 10px; margin-top: 5px; cursor: pointer;">📸 ANALYZE PHOTO</button>
            <pre id="photo-output" style="font-size: 8px; color: #fff; margin-top: 10px; white-space: pre-wrap;"></pre>
        </div>
    </aside>

    <footer id="bottombar">
        <span>FAIL LESS · HARM LESS · RESTORE MORE</span>
        <span id="sys-time">00:00:00</span>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- 1. GALAXY ENGINE (3D) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('galaxy-3d').appendChild(renderer.domElement);

    const starGeom = new THREE.BufferGeometry();
    const starCount = 15000;
    const posArr = new Float32Array(starCount * 3);
    for(let i=0; i < starCount * 3; i++) { posArr[i] = (Math.random() - 0.5) * 12; }
    starGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const starMat = new THREE.PointsMaterial({ size: 0.006, color: 0x00f2ff, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
    const starMesh = new THREE.Points(starGeom, starMat);
    scene.add(starMesh); camera.position.z = 4;

    function animate() { requestAnimationFrame(animate); starMesh.rotation.y += 0.0008; renderer.render(scene, camera); }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- 2. KERNEL SYSTEM LOGIC ---
    let R = "general";
    function toggleP(s) { document.getElementById(s + '-panel').classList.toggle('active'); }
    function setR(r) { R = r; document.querySelectorAll(".engine-btn").forEach(b => b.classList.remove("active")); document.getElementById("btn-" + r).classList.add("active"); }

    setInterval(() => { document.getElementById("sys-time").textContent = new Date().toTimeString().slice(0, 8); }, 1000);

    async function checkHealth() {
        try {
            const res = await fetch("/health");
            const d = await res.json();
            sB("b-ai", d.llm_loaded, "AI OK", "AI OFF");
            sB("b-eng", d.engine_loaded, "ENG OK", "ENG OFF");
            sB("b-lyla", d.lyla_loaded, "LYLA OK", "LYLA OFF");
        } catch(e) { sB("b-ai", false, "", "NO CONN"); }
    }
    function sB(id, ok, a, b) { const el = document.getElementById(id); el.textContent = ok ? a : b; el.className = "sys-badge " + (ok ? "ok" : "off"); }
    checkHealth();

    function addMsg(type, text) {
        const w = document.getElementById("welcome"); if(w) w.remove();
        const area = document.getElementById("chat-area");
        const div = document.createElement("div");
        div.className = "msg-text " + (type === "user" ? "msg-user" : "msg-system");
        div.textContent = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    async function run() {
        const inp = document.getElementById("main-input");
        const t = inp.value.trim(); if(!t) return;
        addMsg("user", t); inp.value = ""; inp.style.height = "auto";
        try {
            const res = await fetch("/run", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({input: t, route: R}) });
            const data = await res.json();
            addMsg("system", data.ai_response || JSON.stringify(data));
            if(data.governance) updateLyla(data);
        } catch(e) { addMsg("system", "ERROR: " + e); }
    }

    function updateLyla(d) {
        const hs = d.governance?.human_state || d.pattern;
        if(hs) {
            document.getElementById("wl-entropy").style.width = hs.entropy + "%";
            document.getElementById("wl-val").textContent = hs.entropy.toFixed(1);
            document.getElementById("dr-val").textContent = (hs.entropy * 0.1).toFixed(2) + "%";
        }
    }

    async function simulate() {
        const paths = [...document.querySelectorAll("#sim-paths input")].map(i => i.value);
        const res = await fetch("/simulate", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({input: "Simulation", paths}) });
        const d = await res.json();
        alert(d.simulation || "Sim Complete");
    }

    async function uploadImage() {
        const f = document.getElementById("photo-file").files[0]; if(!f) return;
        const form = new FormData(); form.append("file", f);
        const res = await fetch("/upload-image", { method: "POST", body: form });
        const d = await res.json();
        document.getElementById("photo-output").textContent = d.message + "\n" + d.recommendation;
    }

    async function stripeCheckout() {
        const res = await fetch("/payment/create-checkout", { method: "POST", body: JSON.stringify({plan: "basic"}) });
        const d = await res.json(); if(d.url) window.location.href = d.url;
    }
</script>
</body>
</html>
