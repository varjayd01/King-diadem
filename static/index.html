<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: radial-gradient(circle at center, #0b1220, #000);
    color: #00ffff;
    text-align: center;
    overflow: hidden;
}

/* 🌌 background stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.2;
}

/* 🌠 main card */
.container {
    position: relative;
    top: 10%;
    width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
    box-shadow: 0 0 40px #00ffff;
}

/* 🧠 logo */
.logo {
    width: 100px;
    border-radius: 50%;
    box-shadow: 0 0 20px #00ffff;
}

/* 🌟 title */
h1 {
    margin: 10px;
    font-size: 32px;
}

/* 🔴 credit warning */
.warning {
    color: #ff4d6d;
    margin: 10px 0;
}

/* 💬 input */
input {
    width: 80%;
    padding: 10px;
    background: black;
    border: 1px solid #00ffff;
    color: #00ffff;
}

/* 🚀 button */
button {
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* 🧠 output */
pre {
    margin-top: 20px;
    text-align: left;
    background: black;
    padding: 10px;
    height: 150px;
    overflow: auto;
}

/* 🌌 causal loop */
.loop {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<img class="logo" src="https://i.imgur.com/yourlogo.png">

<h1>King Diadem</h1>
<div>AI Decision Civilization Platform</div>

<div class="warning">❌ เครดิตหมด (AI ถูกจำกัด)</div>

<input id="input" placeholder="พิมพ์สถานการณ์ของคุณ...">
<br><br>

<button onclick="run()">→</button>

<pre id="output">SYSTEM READY...</pre>

<div class="loop">
เหตุ → ความคิด → การตัดสินใจ → ผลลัพธ์ → วนซ้ำ
</div>

</div>

<script>

async function run() {

    const input = document.getElementById("input").value;

    // 🧠 เรียก core จริง (ของพี่)
    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            input: input,
            state: { energy: 50, food: true, safe_place: true }
        })
    });

    const data = await res.json();

    // ❌ AI intentionally blocked
    const ai = "⚠️ AI ถูกจำกัด (เครดิตหมด)";

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2) +
        "\n\n" + ai;
}

</script>

</body>
</html>
