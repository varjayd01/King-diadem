<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:#e0f7ff;
    background:#000;
    overflow:hidden;
}

/* ⭐ STAR FIELD */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(2px 2px at 80% 70%, white, transparent),
    radial-gradient(1px 1px at 50% 50%, white, transparent);
    animation: twinkle 3s infinite alternate;
    opacity:0.7;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* 🌀 GALAXY */
.galaxy{
    position:fixed;
    width:600px;
    height:600px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,
        rgba(0,255,255,0.15),
        transparent 70%);
    border-radius:50%;
    animation: rotateGalaxy 120s linear infinite;
}

@keyframes rotateGalaxy{
    from{transform:translate(-50%,-50%) rotate(0deg);}
    to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* 🌍 EARTH */
.earth{
    position:fixed;
    right:50px;
    bottom:50px;
    width:200px;
    height:200px;
    border-radius:50%;
    background:url("https://eoimages.gsfc.nasa.gov/images/imagerecords/79000/79765/dnb_land_ocean_ice.2012.5400x2700.jpg") no-repeat;
    background-size:cover;
    box-shadow:0 0 30px rgba(0,150,255,0.5);
    animation: rotateEarth 40s linear infinite;
}

@keyframes rotateEarth{
    from{background-position:0 0;}
    to{background-position:1000px 0;}
}

/* 🧊 UI */
.container{
    position:relative;
    max-width:700px;
    margin:80px auto;
    padding:25px;
    background:rgba(10,20,30,0.8);
    backdrop-filter:blur(20px);
    border-radius:20px;
    border:1px solid rgba(0,255,255,0.2);
    z-index:10;
}

/* 🔷 LOGO + ORBIT */
.logo-wrap{
    position:relative;
    width:100px;
    margin:0 auto 10px;
}

.logo{
    width:100px;
    display:block;
}

.orbit{
    position:absolute;
    width:140px;
    height:140px;
    top:-20px;
    left:-20px;
    border:1px dashed rgba(0,255,255,0.3);
    border-radius:50%;
    animation: orbitRotate 6s linear infinite;
}

.orbit::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    background:#00ffff;
    border-radius:50%;
    top:0;
    left:50%;
    transform:translateX(-50%);
}

@keyframes orbitRotate{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

/* ✍️ INPUT */
textarea{
    width:100%;
    height:100px;
    background:rgba(0,20,30,0.7);
    border:1px solid rgba(0,255,255,0.3);
    border-radius:10px;
    color:#ccfaff;
    padding:10px;
}

/* 🔘 BUTTONS */
.buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.run{background:#00cfff;}
.ai{background:#00ff99;}
.pay{background:#ffd700;}

/* 📦 OUTPUT */
pre{
    margin-top:10px;
    background:black;
    padding:10px;
    max-height:200px;
    overflow:auto;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="galaxy"></div>
<div class="earth"></div>

<div class="container">

<div class="logo-wrap">
    <img src="/static/logo.png" class="logo">
    <div class="orbit"></div>
</div>

<h2 style="text-align:center;">King Diadem</h2>

<textarea id="input"></textarea>

<div class="buttons">
<button class="run" onclick="runEngine()">Run</button>
<button class="ai" onclick="askAI()">AI</button>
<button class="pay" onclick="pay()">Pay</button>
</div>

<pre id="output">READY...</pre>

</div>

<script>

async function runEngine(){
    const input=document.getElementById("input").value;

    const res=await fetch("/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({input})
    });

    const data=await res.json();
    document.getElementById("output").textContent=JSON.stringify(data,null,2);
}

async function askAI(){
    const input=document.getElementById("input").value;
    const email=localStorage.getItem("email")||"guest";

    const res=await fetch("/ai",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({input,email})
    });

    const data=await res.json();
    document.getElementById("output").textContent=data.ai;
}

async function pay(){
    const res=await fetch("/create-checkout-session",{method:"POST"});
    const data=await res.json();
    if(data.url) window.location.href=data.url;
}

</script>

</body>
</html>
