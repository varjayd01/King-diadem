<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #e0f7ff;

    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") no-repeat center center fixed;
    background-size: cover;
}

/* 🔥 ทำให้จักรวาล soft ลง */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    backdrop-filter: blur(4px);

    z-index: -1;
}

/* 🧊 กล่องหลัก */
.container {
    max-width: 800px;
    margin: 60px auto;
    padding: 30px;

    background: rgba(10, 20, 30, 0.75);
    backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(0,255,255,0.2);

    box-shadow: 0 0 40px rgba(0,255,255,0.15);
}

/* 🧠 Title */
h1 {
    margin: 0;
    font-size: 40px;
    color: #00eaff;
}

.sub {
    opacity: 0.6;
    margin-bottom: 20px;
}

/* ✍️ input */
textarea {
    width: 100%;
    height: 120px;
    padding: 12px;

    background: rgba(0,20,30,0.6);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 10px;

    color: #ccfaff;
    font-size: 16px;
}

/* 🎛 slider */
.slider {
    margin: 15px 0;
}

/* 🔘 buttons */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* 🎨 ปุ่ม */
.run {
    background: linear-gradient(135deg, #00cfff, #0077ff);
    color: white;
}

.ai {
    background: linear-gradient(135deg, #00ff99, #00cc66);
    color: black;
}

.pay {
    background: linear-gradient(135deg, #ffd700, #ff9900);
    color: black;
}

/* 📦 output */
pre {
    margin-top: 20px;
    padding: 15px;

    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 10px;

    overflow-x: auto;
}

</style>
</head>

<body>

<div class="container">

    <h1>King Diadem</h1>
    <div class="sub">AI Decision Civilization System</div>

    <textarea id="input" placeholder="พิมพ์สถานการณ์ เช่น ไม่มีเงิน / งานพัง / เครียด"></textarea>

    <div class="slider">
        Energy:
        <input type="range" id="energy" min="0" max="100" value="50">
    </div>

    <div class="buttons">
        <button class="run" onclick="runEngine()">Run Engine</button>
        <button class="ai" onclick="askAI()">Ask AI</button>
        <button class="pay" onclick="pay()">Support</button>
    </div>

    <pre id="output">SYSTEM READY...</pre>

</div>

<script>

/* 🧠 ENGINE */
async function runEngine() {

    const input = document.getElementById("input").value;
    const energy = document.getElementById("energy").value;

    const res = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            input,
            state: {
                energy: parseInt(energy),
                food: true,
                safe_place: true
            }
        })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

/* 🤖 AI */
async function askAI() {

    const input = document.getElementById("input").value;

    const res = await fetch("/ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
        "AI RESPONSE:\n\n" + data.ai;
}

/* 💳 Stripe */
async function pay() {

    const res = await fetch("/create-checkout-session", {
        method: "POST"
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Payment error");
    }
}

</script>

</body>
</html>
