<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KING DIADEM</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: monospace;
    color: #bfefff;
    text-align: center;
    overflow: hidden;

    background: radial-gradient(circle at center, #000000 40%, #020617 100%);
}

/* 🌌 STAR CANVAS */
#stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -3;
}

/* 🌫 GLOW */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 40%, rgba(255,120,0,0.15), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(0,150,255,0.15), transparent 40%);
    z-index: -2;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 0 60px rgba(0,255,255,0.35);
    backdrop-filter: blur(10px);
}

/* LOGO SYSTEM */
.logo-wrap {
    position: relative;
    width: 130px;
    height: 130px;
    margin: auto;
}

.logo {
    width: 100%;
    border-radius: 50%;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 25px #00ffff);
}

/* ORBITS */
.orbit {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    animation: spin 10s linear infinite;
}

.orbit2 {
    position: absolute;
    top: -20px;
    left: -20px;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 1px dashed rgba(100,100,255,0.2);
    animation: spinReverse 18s linear infinite;
}

/* PLANETS */
.planet {
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #ffd27f, #ff5e5e);
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 12px #ff9966;
}

.planet2 {
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, #66ccff, #9999ff);
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px #66ccff;
}

/* TITLE */
h1 {
    margin: 10px 0;
    font-size: 30px;
    background: linear-gradient(90deg,#ffd27f,#66ccff,#9999ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* STATUS */
.status {
    color: #ff5e5e;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    background: black;
    border: 2px solid #66ccff;
    color: #bfefff;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 12px 20px;
    background: linear-gradient(90deg,#ffd700,#ff9966);
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px #ffd700;
}

/* OUTPUT */
pre {
    margin-top: 15px;
    text-align: left;
    background: black;
    padding: 10px;
    border: 1px solid #66ccff;
    height: 150px;
    overflow: auto;
    font-size: 12px;
}

/* ANIMATION */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes spinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
<div class="card">

<div class="logo-wrap">
    <img src="/static/logo.png" class="logo">

    <div class="orbit">
        <div class="planet"></div>
    </div>

    <div class="orbit2">
        <div class="planet2"></div>
    </div>
</div>

<h1>King Diadem</h1>
<div class="status">❌ เครดิตหมด (AI ถูกจำกัด)</div>

<input id="input" placeholder="พิมพ์สถานการณ์...">
<br>
<button onclick="run()">RUN DECISION ENGINE</button>

<pre id="output">System Ready</pre>

</div>
</div>

<script>
/* 🌌 STAR GENERATOR */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.3
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }

    requestAnimationFrame(drawStars);
}

drawStars();

/* ENGINE */
async function run() {
    const text = document.getElementById("input").value;

    document.getElementById("output").innerText = "Running...";

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ input: text })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
