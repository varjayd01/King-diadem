<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- 🔥 FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<title>KING DIADEM</title>

<style>

/* 🌌 GLOBAL */
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #000000 30%, #020617 100%);
    font-family: 'Inter', sans-serif;
    color: #cdefff;
}

/* 🌠 GALAXY BACKGROUND */
#galaxy {
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 40%, rgba(255,120,0,0.3), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(0,150,255,0.3), transparent 40%);
    z-index: -3;
}

/* ⭐ STARS */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* 🌫 LIGHT */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,255,0.05), transparent);
    z-index: -1;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 💎 CARD */
.card {
    width: 440px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.75);
    box-shadow:
        0 0 60px rgba(0,255,255,0.3),
        inset 0 0 20px rgba(0,255,255,0.1);
    backdrop-filter: blur(15px);
}

/* 👑 TITLE */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    margin: 10px 0;

    background: linear-gradient(90deg,#ffd27f,#66ccff,#9999ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow: 0 0 20px rgba(0,255,255,0.4);
}

/* SUB */
.sub {
    font-size: 12px;
    color: #ffd27f;
    margin-bottom: 10px;
}

/* STATUS */
.status {
    color: #ff5e5e;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 92%;
    padding: 12px;
    background: rgba(0,0,0,0.9);
    border: 1px solid #00ccff;
    color: #cdefff;
    outline: none;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 12px 20px;
    background: linear-gradient(90deg,#ffd700,#ff9966);
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px #ffd700;
}

/* OUTPUT */
pre {
    margin-top: 15px;
    text-align: left;
    background: black;
    padding: 12px;
    border: 1px solid #00ccff;
    height: 150px;
    overflow: auto;
}

/* GRID BOX */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.box {
    padding: 10px;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;
    font-size: 12px;
}

</style>
</head>

<body>

<div id="galaxy"></div>
<canvas id="stars"></canvas>

<div class="container">
<div class="card">

<h1>King Diadem</h1>
<div class="sub">Decision Engine Core</div>
<div class="status">❌ เครดิตหมด (AI ถูกจำกัด)</div>

<input id="input" placeholder="พิมพ์สถานการณ์...">
<br>
<button onclick="run()">RUN DECISION ENGINE</button>

<pre id="output">System Ready</pre>

<div class="grid">
    <div class="box">🧠 Choice Engine<br>Preserve Future Choices</div>
    <div class="box">⚖️ Risk Engine<br>Avoid Collapse</div>
    <div class="box">🛡 Survival Engine<br>Stability First</div>
    <div class="box">🔗 Cooperation Engine<br>Human Pathways</div>
</div>

</div>
</div>

<script>

/* ⭐ STAR ENGINE */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.3,
        alpha: Math.random(),
        flicker: Math.random() * 0.02
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let s of stars) {
        s.alpha += s.flicker;
        if (s.alpha > 1 || s.alpha < 0) s.flicker *= -1;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();

        s.y += s.speed;
        if (s.y > canvas.height) s.y = 0;
    }

    requestAnimationFrame(drawStars);
}

drawStars();

/* ENGINE */
async function run() {
    const text = document.getElementById("input").value;

    document.getElementById("output").innerText = "Running...";

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ input: text })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
