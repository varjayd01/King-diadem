<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING DIADEM</title>

<link rel="manifest" href="/static/manifest.json">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<canvas id="galaxy"></canvas>

<div class="panel">

<h1>👑 KING DIADEM</h1>

<div class="philosophy">

ระบบใดที่ทำให้ทางเลือกของมนุษย์ = 0  
ระบบนั้นล้มเหลว  

<br><br>

Any system that reduces human choice to zero  
is a failed system.

</div>

<div class="buttons">

<button onclick="ask()">ASK</button>

<button onclick="brain()">BRAIN</button>

<button onclick="galaxy()">GALAXY</button>

<button onclick="guide()">GUIDE</button>

</div>

</div>


<script src="/static/galaxy.js"></script>
<script src="/static/ai_thinking.js"></script>
<script src="/static/decision.js"></script>

<script>

function ask(){

let q = prompt("Your problem")

fetch("/decision",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

problem:q

})

})

.then(r=>r.json())

.then(d=>{

alert(d.answer)

})

}


function brain(){

window.location="/ai/brain"

}


function galaxy(){

window.location="/ai/galaxy"

}


function guide(){

window.location="/static/guide.html"

}

</script>


</body>
</html>
