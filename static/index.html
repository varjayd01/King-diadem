<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BACKGROUND */
body{
margin:0;
font-family:monospace;
background:black;
color:#bfefff;
overflow:hidden;
}

/* 🌠 STARS */
#stars{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* 🧠 MAIN UI */
.container{
position:relative;
z-index:2;
max-width:700px;
margin:80px auto;
background:rgba(0,0,0,0.85);
padding:30px;
border-radius:15px;
box-shadow:0 0 50px rgba(0,255,255,0.5);
text-align:center;
}

/* 👑 TITLE */
.title{
font-size:42px;
letter-spacing:2px;
background:linear-gradient(90deg,#66ccff,#9999ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title span{
background:linear-gradient(90deg,#ffd27f,#ff9966);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUBTITLE */
p{
color:#ffd27f;
opacity:0.9;
letter-spacing:1px;
}

/* ❌ CREDIT */
.credit{
color:#ff5e5e;
text-shadow:0 0 10px #ff5e5e;
margin:10px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
background:#000;
border:1px solid #00ffff;
color:#bfefff;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px;
width:100%;
background:linear-gradient(90deg,#ffd700,#ff9966);
border:none;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 20px #ffd700;
}

/* RESULT */
pre{
margin-top:20px;
text-align:left;
background:#000;
padding:15px;
border:1px solid #66ccff;
color:#66ccff;
overflow:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

/* MODULE */
.module{
background:#0a0a0a;
padding:10px;
border:1px solid rgba(0,255,255,0.3);
color:#ddd;
transition:0.3s;
}

.module:hover{
border:1px solid #ffd27f;
color:#ffd27f;
box-shadow:0 0 15px #ffd27f;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<h1 class="title">
<span>K</span>ing Diadem
</h1>

<p>Decision Engine Core</p>

<div class="credit">
❌ เครดิตหมด (AI ถูกจำกัด)
</div>

<input id="input" placeholder="พิมพ์สถานการณ์ของคุณ...">

<button onclick="runDecision()">
RUN DECISION ENGINE
</button>

<pre id="result">
{
 "system":"KING DIADEM",
 "status":"READY",
 "ai":"DISABLED"
}
</pre>

<div class="grid">

<div class="module">🧠 Choice Engine<br>Preserve Future Choices</div>
<div class="module">⚖ Risk Engine<br>Avoid Collapse</div>
<div class="module">🌍 Survival Engine<br>Stability First</div>
<div class="module">🔗 Cooperation Engine<br>Human Pathways</div>

</div>

</div>

<script>

/* 🌌 STARS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = [
"#ffffff","#ffd27f","#ff9966","#ff5e5e","#66ccff","#9999ff"
];

let stars = [];

for (let i = 0; i < 400; i++) {
stars.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
size: Math.random() * 2,
speed: Math.random() * 0.5,
color: colors[Math.floor(Math.random()*colors.length)],
glow: Math.random()*10
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
ctx.beginPath();
ctx.shadowBlur = s.glow;
ctx.shadowColor = s.color;
ctx.fillStyle = s.color;
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y += s.speed;
if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}
});

requestAnimationFrame(drawStars);
}

drawStars();

/* 🧠 DECISION */
async function runDecision(){

document.getElementById("result").innerText="Running..."

try{

let response = await fetch("/decision",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
location:"earth",
food:"medium",
money:50,
risk:"low"
})
})

let data = await response.json()

document.getElementById("result").innerText =
JSON.stringify(data,null,2)

}catch(e){

document.getElementById("result").innerText =
JSON.stringify({
observer:"KING DIADEM",
status:"AI DISABLED",
note:"ระบบยังทำงาน แต่ AI ถูกจำกัด"
},null,2)

}

}

</script>

</body>
</html>
