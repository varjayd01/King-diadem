<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

  <img src="/static/logo.png" class="logo">

  <h1>KING DIADEM</h1>

  <!-- 🚨 EMERGENCY -->
  <div class="card emergency">
    <input id="q" placeholder="พิมพ์ตอนนี้เลย..." />
    <button onclick="ask()">ASK</button>
    <p id="ans"></p>
  </div>

  <!-- 💬 GROUP CHAT -->
  <div class="card">
    <h3>🌍 Group Chat</h3>
    <input id="gmsg" placeholder="ระบายได้เลย..." />
    <button onclick="sendGroup()">Send</button>
    <div id="groupBox"></div>
  </div>

  <!-- ⚙️ Persona -->
  <div class="card">
    <h3>⚙️ Persona</h3>
    <input id="name" placeholder="ชื่อ">
    <input id="tone" placeholder="โทน เช่น สนุก / ลึก">
    <button onclick="save()">Save</button>
  </div>

  <!-- 📊 Dashboard -->
  <div class="card">
    <button onclick="loadDash()">📊 Dashboard</button>
    <pre id="dash"></pre>
  </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
