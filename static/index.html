<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>KING DIADEM</title>

<style>

body{
background:#050816;
color:white;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
margin:0;
padding:0;
}

header{
padding:40px 20px;
font-size:32px;
font-weight:bold;
}

.subtitle{
color:#9aa4ff;
margin-bottom:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input{
padding:12px;
width:60%;
border:none;
border-radius:6px;
margin-right:10px;
}

button{
padding:12px 20px;
border:none;
background:#5b7cff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#738fff;
}

#result{
margin-top:30px;
text-align:left;
}

.option{
background:#0f1329;
padding:12px;
margin:8px 0;
border-radius:6px;
}

.section{
margin-top:50px;
}

.chatbox{
margin-top:20px;
}

.chatmsg{
background:#0d1025;
margin:5px;
padding:8px;
border-radius:4px;
}

footer{
margin-top:60px;
padding:20px;
font-size:14px;
color:#aaa;
}

</style>

</head>


<body>

<header>KING DIADEM</header>

<div class="subtitle">

Any system that reduces human choice to zero is a failed system

</div>


<div class="container">

<h2>Strategic Decision Engine</h2>

<input id="question" placeholder="Ask a strategic question">

<button onclick="askAI()">ASK</button>

<div id="result"></div>

</div>


<div class="container section">

<h2>Planetary Freedom Signal</h2>

<div id="freedom">Loading...</div>

</div>


<div class="container section">

<h2>Galaxy Decision Network</h2>

<div id="galaxy"></div>

</div>


<div class="container section">

<h2>Global Decision Map</h2>

<div id="decisionmap"></div>

</div>


<div class="container section">

<h2>Global Decision Network</h2>

<div class="chatbox">

<input id="chatname" placeholder="name">

<input id="chatmsg" placeholder="message">

<button onclick="sendChat()">send</button>

</div>

<div id="chatlog"></div>

</div>


<footer>

KING DIADEM Planetary Decision Infrastructure

</footer>



<script src="/static/app.js"></script>


<script>


async function askAI(){

const q=document.getElementById("question").value

const res=await fetch("/ask",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({question:q})

})

const data=await res.json()

const result=document.getElementById("result")

result.innerHTML=""

data.options.forEach((o,i)=>{

const div=document.createElement("div")

div.className="option"

div.innerHTML=(i+1)+". "+o

result.appendChild(div)

})

}



async function loadFreedom(){

const r=await fetch("/freedom")

const d=await r.json()

document.getElementById("freedom").innerHTML=

"Freedom Index: "+d.freedom_index+" ("+d.status+")"

}



async function loadGalaxy(){

const r=await fetch("/galaxy")

const d=await r.json()

document.getElementById("galaxy").innerHTML=

"Active decision stars: "+d.stars.length

}



async function loadDecisionMap(){

const r=await fetch("/decision/map")

const d=await r.json()

document.getElementById("decisionmap").innerHTML=

"Decision nodes detected: "+d.nodes.length

}



async function loadChat(){

const r=await fetch("/world/messages")

const d=await r.json()

const log=document.getElementById("chatlog")

log.innerHTML=""

d.messages.forEach(m=>{

const div=document.createElement("div")

div.className="chatmsg"

div.innerHTML="<b>"+m.user+":</b> "+m.message

log.appendChild(div)

})

}



async function sendChat(){

const name=document.getElementById("chatname").value

const msg=document.getElementById("chatmsg").value

await fetch("/world/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

user:name,

message:msg

})

})

loadChat()

}



window.onload=function(){

loadFreedom()

loadGalaxy()

loadDecisionMap()

loadChat()

}

</script>

</body>
</html>
