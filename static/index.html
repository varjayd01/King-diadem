<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING DIADEM™ - DriftZero OS</title>
    <style>
        :root { --cyan: #63f6ff; --green: #4af3a4; --red: #ff6b6b; --bg: #03050a; }
        body { background: var(--bg); color: #d0e8ff; font-family: monospace; padding: 30px; line-height: 1.6; }
        .panel { border: 1px solid #1a2a4a; background: rgba(10,20,40,0.6); padding: 25px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; background: #000; color: var(--cyan); border: 1px solid #1a2a4a; padding: 15px; font-size: 16px; border-radius: 5px; outline: none; }
        .btn { background: var(--cyan); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan); }
        .survival-box { border: 2px solid var(--red); padding: 15px; border-radius: 5px; color: var(--red); margin-bottom: 20px; }
        .view-card { margin-top: 30px; border-left: 2px solid var(--cyan); padding-left: 20px; }
        .summary-box { background: rgba(74,243,164,0.1); border: 1px solid var(--green); color: var(--green); padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 5px; }
        h1 { text-align: center; letter-spacing: 10px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: auto;">
        <h1>KING DIADEM</h1>
        <p style="text-align: center; font-size: 10px; opacity: 0.6;">DRIFTZERO WATERLINE GOVERNANCE OS</p>

        <div class="panel">
            <textarea id="userInput" rows="4" placeholder="ระบุสิ่งที่ปรากฏในความจริง... (Ego OFF, Evidence ON)"></textarea>
            
            <div style="display: flex; gap: 20px; margin-top: 15px; font-size: 12px; justify-content: space-around;">
                <div>Energy: <input type="range" id="energy" value="80"></div>
                <label><input type="checkbox" id="food" checked> Food Access</label>
                <label><input type="checkbox" id="safe" checked> Safe Place</label>
                <select id="mental" style="background:#000; color:#fff; border:1px solid #1a2a4a;">
                    <option value="stable">จิตปกติ</option>
                    <option value="overwhelmed">ไม่ไหวแล้ว</option>
                </select>
            </div>
            
            <button class="btn" onclick="runKernel()">RUN RUNTIME GATES</button>
        </div>

        <div id="output"></div>
    </div>

    <script>
        async function runKernel() {
            const out = document.getElementById("output");
            out.innerHTML = "<p style='color:var(--cyan)'>[แสงกำลังเดินทาง... ตรวจสอบกฎ K1-K14]</p>";

            const payload = {
                input: document.getElementById("userInput").value,
                state: {
                    energy: parseInt(document.getElementById("energy").value),
                    money: 100, // สามารถเพิ่ม input ได้
                    food_access: document.getElementById("food").checked,
                    safe_place: document.getElementById("safe").checked,
                    mental_state: document.getElementById("mental").value,
                    time_available: 1
                }
            };

            const res = await fetch("/ENGINE", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            render(data);
        }

        function render(data) {
            const out = document.getElementById("output");
            let html = "";

            // 1. โชว์ Survivor Alert ถ้าพื้นฐานสั่นคลอน
            if (data.survival.status !== "STABLE") {
                html += `<div class="survival-box">
                    <strong>🚩 STOP-THE-LINE: CRITICAL SURVIVAL NEEDED</strong><br>
                    สถานะ: ${data.survival.status}<br>
                    สิ่งที่ต้องทำ: ${data.survival.actions.join(", ")}
                </div>`;
            }

            // 2. โชว์มิติมุมมอง (วงแห่งทางเลือก)
            data.perspectives.forEach(p => {
                const parts = p.split("[สรุปความจริงเพื่อการใช้งาน]:");
                html += `<div class="view-card">
                    <div style="white-space: pre-wrap; color: #b0cce0;">${parts[0].trim()}</div>
                    ${parts[1] ? `<div class="summary-box">🚩 สรุปการนำไปใช้: ${parts[1].trim()}</div>` : ""}
                </div>`;
            });
            out.innerHTML = html;
        }
    </script>
</body>
</html>
