<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    color: #e6f1ff;

    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") no-repeat center center fixed;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🔥 glass card */
.container {
    width: 90%;
    max-width: 720px;
    padding: 30px;

    background: rgba(0,0,0,0.75);
    border-radius: 20px;
    backdrop-filter: blur(10px);

    box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

/* title */
h1 {
    margin: 0;
    font-size: 36px;
    color: #00eaff;
    text-shadow: 0 0 15px rgba(0,234,255,0.8);
}

.sub {
    margin-top: 5px;
    margin-bottom: 20px;
    color: #aaa;
}

/* textarea */
textarea {
    width: 100%;
    height: 130px;
    padding: 12px;

    background: rgba(0,0,0,0.8);
    border: 1px solid #00eaff;
    border-radius: 10px;

    color: #00eaff;
}

/* buttons */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

/* theme colors */
.run {
    background: linear-gradient(45deg, #00eaff, #0099ff);
    color: black;
}

.ai {
    background: linear-gradient(45deg, #00ff9d, #00cc88);
}

.pay {
    background: linear-gradient(45deg, gold, orange);
    color: black;
}

/* output */
pre {
    margin-top: 20px;
    padding: 15px;

    background: rgba(0,0,0,0.85);
    border-radius: 10px;
    border: 1px solid #00eaff;

    max-height: 250px;
    overflow: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>King Diadem</h1>
<div class="sub">AI Decision Civilization System</div>

<textarea id="input" placeholder="Describe your situation..."></textarea>

<div class="buttons">
    <button class="run" onclick="runEngine()">Run Engine</button>
    <button class="ai" onclick="askAI()">Ask AI</button>
    <button class="pay" onclick="pay()">Support</button>
</div>

<pre id="output">System ready...</pre>

</div>

<script>
async function runEngine() {
    const input = document.getElementById("input").value;

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({input})
    });

    const data = await res.json();

    document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
}

async function askAI() {
    const input = document.getElementById("input").value;

    const res = await fetch("/ai", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({input})
    });

    const data = await res.json();

    document.getElementById("output").textContent =
        data.ai;
}

async function pay() {
    const res = await fetch("/create-checkout-session", {
        method: "POST"
    });

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    }
}
</script>

</body>
</html>
