<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #e0f7ff;

    background: radial-gradient(circle at center, #0b1a2a, #000);
    overflow-x: hidden;
}

/* 🌌 Universe layer */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover no-repeat;
    opacity: 0.25;

    filter: blur(2px);
    z-index: -2;
}

/* 🌫 overlay ให้กลืน */
body::after {
    content: "";
    position: fixed;
    inset: 0;

    background: radial-gradient(circle at center,
        rgba(0, 255, 255, 0.08),
        rgba(0, 0, 0, 0.9)
    );

    z-index: -1;
}

/* 🧊 container */
.container {
    max-width: 780px;
    margin: 80px auto;
    padding: 30px;

    background: rgba(10, 20, 30, 0.75);
    backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(0,255,255,0.15);

    box-shadow: 0 0 60px rgba(0,255,255,0.12);
}

/* 🔷 logo */
.logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 60px;
    opacity: 0.9;
}

/* 🧠 title */
.title {
    text-align: center;
    margin-bottom: 20px;
}

.title h1 {
    margin: 0;
    font-size: 36px;
    color: #00eaff;
}

.sub {
    opacity: 0.6;
}

/* ✍️ textarea */
textarea {
    width: 100%;
    height: 120px;
    padding: 12px;

    background: rgba(0,20,30,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 10px;

    color: #ccfaff;
}

/* 🎛 slider */
.slider {
    margin: 15px 0;
}

/* 🔘 buttons */
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
}

/* 🎨 buttons */
.run {
    background: linear-gradient(135deg, #00cfff, #0066ff);
}

.ai {
    background: linear-gradient(135deg, #00ff99, #00cc66);
}

.pay {
    background: linear-gradient(135deg, #ffd700, #ff9900);
}

/* 📦 output */
pre {
    margin-top: 20px;
    padding: 15px;

    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;

    max-height: 260px;
    overflow: auto;
}

</style>
</head>

<body>

<!-- 🔷 logo -->
<img src="/static/logo.png" class="logo">

<div class="container">

<div class="title">
    <h1>King Diadem</h1>
    <div class="sub">AI Decision Civilization System</div>
</div>

<textarea id="input" placeholder="พิมพ์สถานการณ์ เช่น ไม่มีเงิน / งานพัง / เครียด"></textarea>

<div class="slider">
Energy:
<input type="range" id="energy" min="0" max="100" value="50">
</div>

<div class="buttons">
<button class="run" onclick="runEngine()">Run Engine</button>
<button class="ai" onclick="askAI()">Ask AI</button>
<button class="pay" onclick="pay()">Support</button>
</div>

<pre id="output">SYSTEM READY...</pre>

</div>

<script>

async function runEngine() {
    const output = document.getElementById("output");
    output.textContent = "Running engine...";

    try {
        const input = document.getElementById("input").value;
        const energy = document.getElementById("energy").value;

        const res = await fetch("/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                input,
                state: {
                    energy: parseInt(energy),
                    food: true,
                    safe_place: true
                }
            })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

    } catch (e) {
        output.textContent = "ENGINE ERROR";
    }
}

async function askAI() {
    const output = document.getElementById("output");
    output.textContent = "Thinking...";

    try {
        const input = document.getElementById("input").value;

        const res = await fetch("/ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input })
        });

        const data = await res.json();
        output.textContent = data.ai;

    } catch (e) {
        output.textContent = "AI ERROR";
    }
}

async function pay() {
    try {
        const res = await fetch("/create-checkout-session", {
            method: "POST"
        });

        const data = await res.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Payment error");
        }

    } catch (e) {
        alert("Stripe error");
    }
}

</script>

</body>
</html>
