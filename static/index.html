<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KING DIADEM</title>
<style>
html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #000000;
    font-family: monospace;
    color: #cdefff;
}

#stars {
    position: fixed;
    width: 100%; height: 100%;
    z-index: 0;
}

body::before {
    content: "";
    position: fixed;
    width: 100%; height: 100%;
    background: radial-gradient(circle at center, rgba(0,255,255,0.03), transparent);
    z-index: 1;
}

.orbit-system {
    position: absolute;
    top: -140px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
}
.ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; }
.ring1 { border: 1px solid rgba(255,120,0,0.4); box-shadow: 0 0 25px rgba(255,120,0,0.4); animation: spin 18s linear infinite; }
.ring2 { border: 1px dashed rgba(0,150,255,0.4); box-shadow: 0 0 25px rgba(0,150,255,0.4); animation: spinReverse 25s linear infinite; }
.sun { width:14px; height:14px; background: radial-gradient(circle,#ff6a00,#ff0000); box-shadow: 0 0 20px #ff6a00; position:absolute; top:0; left:50%; transform:translateX(-50%); border-radius:50%; }
.planet { width:12px; height:12px; background: radial-gradient(circle,#00ccff,#0044ff); box-shadow: 0 0 15px #00ccff; position:absolute; bottom:0; left:50%; transform:translateX(-50%); border-radius:50%; }

@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes spinReverse { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow-y: auto;
}

.card {
    width: 440px;
    max-height: 95vh;
    overflow-y: auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.75);
    box-shadow: 0 0 80px rgba(0,255,255,0.35), inset 0 0 30px rgba(0,255,255,0.1);
    backdrop-filter: blur(15px);
    position: relative;
    z-index: 2;
    scrollbar-width: none;
}
.card::-webkit-scrollbar { display: none; }

h1 {
    font-size: 36px;
    background: linear-gradient(90deg,#ffd27f,#66ccff,#9999ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0 0 4px 0;
}
.sub { font-size: 12px; color: #ffd27f; margin-bottom: 8px; }

/* STATUS BAR */
.status-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
}
.badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
}
.badge.ok { border-color: #00ff88; color: #00ff88; }
.badge.err { border-color: #ff5e5e; color: #ff5e5e; }
.badge.warn { border-color: #ffd700; color: #ffd700; }

input {
    width: 92%; padding: 12px;
    background: rgba(0,0,0,0.9);
    border: 1px solid #00ccff;
    color: #cdefff;
    border-radius: 4px;
    outline: none;
}

.btn-run {
    margin-top: 10px;
    padding: 12px 20px;
    background: linear-gradient(90deg,#ffd700,#ff9966);
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px #ffd700;
    border-radius: 4px;
    width: 100%;
    font-family: monospace;
    font-size: 14px;
    transition: opacity 0.2s;
}
.btn-run:hover { opacity: 0.85; }
.btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

pre {
    margin-top: 12px;
    text-align: left;
    background: black;
    padding: 12px;
    border: 1px solid #00ccff;
    height: 130px;
    overflow-y: auto;
    font-size: 11px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-word;
}

/* ENGINE GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
}

.box {
    padding: 10px 12px;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
    user-select: none;
    position: relative;
    overflow: hidden;
}
.box:hover {
    border-color: rgba(0,255,255,0.6);
    background: rgba(0,255,255,0.05);
    box-shadow: 0 0 15px rgba(0,255,255,0.15);
}
.box.active {
    border-color: #ffd700;
    background: rgba(255,215,0,0.08);
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}
.box .route-tag {
    font-size: 9px;
    color: rgba(0,255,255,0.4);
    display: block;
    margin-top: 2px;
}

/* STRIPE SECTION */
.stripe-section {
    margin-top: 14px;
    border-top: 1px solid rgba(0,255,255,0.1);
    padding-top: 12px;
}
.stripe-section .label {
    font-size: 11px;
    color: #ffd27f;
    margin-bottom: 8px;
}
.btn-stripe {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #635bff, #a259ff);
    border: none;
    color: white;
    font-weight: bold;
    font-family: monospace;
    cursor: pointer;
    border-radius: 6px;
    font-size: 13px;
    box-shadow: 0 0 20px rgba(99,91,255,0.4);
    transition: opacity 0.2s;
}
.btn-stripe:hover { opacity: 0.85; }

/* ROUTE INDICATOR */
.route-display {
    font-size: 10px;
    color: rgba(0,255,255,0.5);
    margin-top: 6px;
    height: 14px;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
<div class="card">

<div class="orbit-system">
    <div class="ring ring1"><div class="sun"></div></div>
    <div class="ring ring2"><div class="planet"></div></div>
</div>

<h1>King Diadem</h1>
<div class="sub">Decision Engine Core</div>

<div class="status-bar">
    <span class="badge" id="badge-ai">⟳ AI Loading...</span>
    <span class="badge" id="badge-engine">⟳ Engine...</span>
</div>

<input id="input" placeholder="พิมพ์สถานการณ์..." onkeydown="if(event.key==='Enter')run()">
<div class="route-display" id="route-display"></div>

<button class="btn-run" id="btn-run" onclick="run()">▶ RUN DECISION ENGINE</button>

<pre id="output">System Ready — กด Engine ด้านล่างหรือพิมพ์สถานการณ์แล้วกด RUN</pre>

<!-- ENGINE BOXES — แต่ละตัวยิง route ตรงๆ -->
<div class="grid">
    <div class="box" id="box-choice" onclick="runRoute('general')">
        🧠 Choice Engine
        <span class="route-tag">route: general</span>
    </div>
    <div class="box" id="box-risk" onclick="runRoute('risk')">
        ⚖️ Risk Engine
        <span class="route-tag">route: risk</span>
    </div>
    <div class="box" id="box-survival" onclick="runRoute('survival')">
        🛡 Survival Engine
        <span class="route-tag">route: survival</span>
    </div>
    <div class="box" id="box-collapse" onclick="runRoute('collapse')">
        🔗 Collapse Detector
        <span class="route-tag">route: collapse</span>
    </div>
</div>

<!-- STRIPE TOP-UP -->
<div class="stripe-section">
    <div class="label">💳 เติมเครดิต AI</div>
    <button class="btn-stripe" onclick="stripeCheckout()">
        ⚡ TOP UP — Stripe
    </button>
</div>

</div>
</div>

<script>
/* ── STARS ── */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener("resize",resize);
let stars=[];
for(let i=0;i<400;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2.5,speed:Math.random()*0.4+0.05,alpha:Math.random(),flicker:Math.random()*0.05,drift:(Math.random()-0.5)*0.4,color:Math.random()});
function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let s of stars){
        s.alpha+=s.flicker; if(s.alpha>1||s.alpha<0) s.flicker*=-1;
        s.y+=s.speed; s.x+=s.drift;
        if(s.y>canvas.height) s.y=0; if(s.x>canvas.width) s.x=0; if(s.x<0) s.x=canvas.width;
        let c=s.color<0.33?"255,255,255":s.color<0.66?"0,200,255":"255,120,0";
        ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(${c},${s.alpha})`; ctx.fill();
    }
    requestAnimationFrame(drawStars);
}
drawStars();

/* ── HEALTH CHECK ── */
async function checkHealth(){
    try {
        const r = await fetch("/health");
        const d = await r.json();
        const aiEl = document.getElementById("badge-ai");
        const engEl = document.getElementById("badge-engine");
        if(d.llm_loaded){
            aiEl.textContent = "✅ Gemini ON";
            aiEl.className = "badge ok";
        } else {
            aiEl.textContent = "❌ AI Offline";
            aiEl.className = "badge err";
        }
        if(d.engine_loaded){
            engEl.textContent = "✅ Engine ON";
            engEl.className = "badge ok";
        } else {
            engEl.textContent = "⚠ Engine Offline";
            engEl.className = "badge warn";
        }
    } catch(e){
        document.getElementById("badge-ai").textContent = "❌ No Connection";
        document.getElementById("badge-ai").className = "badge err";
    }
}
checkHealth();

/* ── RUN (input text → auto route) ── */
async function run(){
    const text = document.getElementById("input").value.trim();
    if(!text){ document.getElementById("output").innerText = "⚠ กรุณาพิมพ์สถานการณ์ก่อนกด RUN"; return; }
    setLoading(true);
    clearActiveBox();

    const res = await fetch("/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({input: text})
    });
    const data = await res.json();
    showResult(data);
    setLoading(false);
}

/* ── RUN SPECIFIC ROUTE ── */
async function runRoute(route){
    const text = document.getElementById("input").value.trim() || `[${route} mode]`;
    setLoading(true);
    clearActiveBox();
    highlightBox(route);

    // map route → signals ที่จะ trigger pattern_engine ให้เลือก route ถูก
    const signals = {
        survival:  { resource: 10, entropy: 85 },
        risk:      { stability: 20 },
        collapse:  { entropy: 75, stability: 30 },
        uncertain: { confidence: 0.2 },
        general:   {}
    };

    const payload = { input: text, ...(signals[route] || {}) };

    const res = await fetch("/run",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    document.getElementById("route-display").textContent = `→ routed: ${data.route || route}`;
    showResult(data);
    setLoading(false);
}

function showResult(data){
    const out = document.getElementById("output");
    if(data.result){
        // แสดง result หลักก่อน ตามด้วย metadata
        let text = "";
        if(typeof data.result === "string") text = data.result;
        else if(data.result.advice) text = data.result.advice;
        else if(data.result.plan) text = data.result.plan;
        else if(data.result.message) text = data.result.message;
        else text = JSON.stringify(data.result, null, 2);

        out.innerText = `[${data.route?.toUpperCase() || "ENGINE"}]\n\n${text}`;
    } else {
        out.innerText = JSON.stringify(data, null, 2);
    }
}

function setLoading(on){
    const btn = document.getElementById("btn-run");
    const out = document.getElementById("output");
    btn.disabled = on;
    if(on) out.innerText = "⟳ Running engine...";
}

function highlightBox(route){
    const map = { general:"box-choice", risk:"box-risk", survival:"box-survival", collapse:"box-collapse", uncertain:"box-choice" };
    const el = document.getElementById(map[route]);
    if(el) el.classList.add("active");
}

function clearActiveBox(){
    document.querySelectorAll(".box").forEach(b => b.classList.remove("active"));
    document.getElementById("route-display").textContent = "";
}

/* ── STRIPE ── */
async function stripeCheckout(){
    try {
        const r = await fetch("/payment/create-checkout",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({credits: 100})
        });
        const d = await r.json();
        if(d.url) window.location.href = d.url;
        else document.getElementById("output").innerText = "❌ Stripe: " + (d.error || "ไม่สามารถสร้าง checkout ได้");
    } catch(e){
        document.getElementById("output").innerText = "❌ Stripe endpoint ยังไม่พร้อม\nต้องเพิ่ม POST /payment/create-checkout ใน app.py";
    }
}
</script>
</body>
</html>
