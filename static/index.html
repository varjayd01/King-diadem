<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING DIADEM</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05070d;
color:white;
text-align:center;
}

.hero{
padding:60px 20px;
}

h1{
font-size:40px;
}

input{
padding:12px;
width:70%;
max-width:300px;
background:#0f132b;
border:1px solid #2a2f66;
color:white;
border-radius:8px;
margin:5px;
}

button{
padding:12px 16px;
background:#5b7cff;
border:none;
color:white;
border-radius:8px;
margin:5px;
}

#response{
margin-top:20px;
max-width:500px;
margin-left:auto;
margin-right:auto;
padding:15px;
background:#0b0f22;
border-left:4px solid #5b7cff;
border-radius:10px;
}

#thinking{
color:#aaa;
margin-top:10px;
}

.card{
background:#0b0f22;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:200px;
}

.login{
margin-top:40px;
}

</style>

</head>

<body>

<div class="hero">

<h1>KING DIADEM</h1>

<p>AI Strategic Command Center</p>

<p>
If Choice = 0 → System Failed<br>
If Choice ≥ 1 → System Alive
</p>

<input id="question" placeholder="พิมพ์สิ่งที่คุณกำลังเจอ">
<button onclick="ask()">ASK</button>

<p style="color:#8aa0ff;">
คุณไม่ได้หมดทางเลือก แค่ยังไม่เห็นมัน
</p>

<div id="thinking"></div>
<div id="response"></div>

</div>

<!-- LOGIN -->
<div class="login">

<h2>Login</h2>

<button onclick="fakeLogin('Google')">Google</button>
<button onclick="fakeLogin('Facebook')">Facebook</button>
<button onclick="fakeLogin('Instagram')">Instagram</button>

<p id="loginStatus"></p>

</div>

<!-- PRICING -->
<h2>Pricing</h2>

<div class="card">Premium ฿279</div>
<div class="card">Pro ฿789</div>
<div class="card">Sovereign ฿1650</div>

<!-- CHAT -->
<h2>Network</h2>

<input id="name" placeholder="name">
<input id="message" placeholder="message">
<button onclick="send()">Send</button>

<div id="messages"></div>

<script src="/static/app.js"></script>

</body>
</html>
