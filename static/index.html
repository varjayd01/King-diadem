<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>King Diadem</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="overlay"></div>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- TITLE -->
    <h1 class="title">
        <span class="cosmic">K</span>ing 
        <span class="cosmic">D</span>iadem
    </h1>

    <!-- INPUT -->
    <textarea id="inputBox" placeholder="พิมพ์สิ่งที่พี่ต้องการ..."></textarea>

    <!-- CONTROLS -->
    <div class="controls">
        <label>Energy</label>
        <input type="range" id="energy" min="0" max="100" value="50">

        <label><input type="checkbox" id="food" checked> Food</label>
        <label><input type="checkbox" id="safe" checked> Safe</label>

        <select id="mode">
            <option>Stable</option>
            <option>Risk</option>
            <option>Escape</option>
        </select>
    </div>

    <!-- BUTTON -->
    <button onclick="runDecision()">RUN DECISION ENGINE</button>

    <!-- OUTPUT -->
    <div id="output"></div>

</div>

<script src="app.js"></script>
</body>
</html>
