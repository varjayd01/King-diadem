<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<style>
body {
margin:0;
background:#020617;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#header {
padding:15px;
background:#0f172a;
text-align:center;
font-size:20px;
font-weight:bold;
}

#chat {
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg {
max-width:70%;
padding:10px;
border-radius:10px;
}

.user {
align-self:flex-end;
background:#22c55e;
color:black;
}

.bot {
align-self:flex-start;
background:#1e293b;
}

#inputBox {
display:flex;
padding:10px;
background:#0f172a;
}

#msg {
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:8px;
}

button {
margin-left:10px;
padding:12px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="header">👑 KING DIADEM</div>

<div id="chat"></div>

<div id="inputBox">
<input id="msg" placeholder="พิมพ์ข้อความ...">
<button onclick="send()">Send</button>
</div>

<script src="/static/app.js"></script>

</body>
</html>
