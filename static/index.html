<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<img src="/static/logo.png" class="logo">

<div class="title">
  <h1>King Diadem</h1>
  <div class="sub">AI Decision Civilization Platform</div>
</div>

<div class="chat" id="chat">
  <div class="msg-ai">SYSTEM READY...</div>
</div>

<div class="input-box">
  <input id="input" placeholder="พิมพ์สถานการณ์ของคุณ...">
  <button onclick="send()">→</button>
</div>

</div>

<script>

function addMessage(text, type){
  const chat = document.getElementById("chat")

  const div = document.createElement("div")
  div.className = type === "user" ? "msg-user" : "msg-ai"
  div.innerText = text

  chat.appendChild(div)
  chat.scrollTop = chat.scrollHeight
}

async function send(){

  const inputEl = document.getElementById("input")
  const input = inputEl.value

  if(!input) return

  addMessage(input, "user")

  inputEl.value = ""

  // thinking...
  const thinking = document.createElement("div")
  thinking.className = "msg-ai thinking"
  thinking.innerText = "thinking..."
  document.getElementById("chat").appendChild(thinking)

  try {

    const res = await fetch("/ai",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input})
    })

    const data = await res.json()

    thinking.remove()

    addMessage(data.ai, "ai")

  } catch(e){
    thinking.remove()
    addMessage("SYSTEM ERROR", "ai")
  }
}

</script>

</body>
</html>
