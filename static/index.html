<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KING DIADEM</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: monospace;
    color: #bfefff;
    text-align: center;
    overflow: hidden;
}

/* 🌌 STAR CANVAS */
#stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -2;
}

/* 🌠 CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 💎 CARD */
.card {
    width: 400px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 0 60px rgba(0,255,255,0.4);
    backdrop-filter: blur(10px);
    position: relative;
}

/* 👑 LOGO CORE */
.logo-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin: auto;
}

/* 🔵 LOGO */
.logo {
    width: 100%;
    border-radius: 50%;
    z-index: 2;
    position: relative;
}

/* 🌍 ORBIT RING */
.orbit {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    animation: spin 8s linear infinite;
}

/* ☀️ PLANET / LIGHT */
.planet {
    width: 12px;
    height: 12px;
    background: radial-gradient(circle, #ffd27f, #ff5e5e);
    border-radius: 50%;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 15px #ff9966;
}

/* 🔥 SECOND ORBIT */
.orbit2 {
    position: absolute;
    top: -20px;
    left: -20px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 1px dashed rgba(100,100,255,0.2);
    animation: spinReverse 14s linear infinite;
}

.planet2 {
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, #66ccff, #9999ff);
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px #66ccff;
}

/* 🔁 ANIMATION */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes spinReverse {
    from { transform: rotate(360deg); }
    to { transform: rotate(0deg); }
}

/* 👑 TITLE */
h1 {
    margin: 10px 0;
    font-size: 30px;
    background: linear-gradient(90deg,#ffd27f,#66ccff,#9999ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🔻 STATUS */
.status {
    color: #ff5e5e;
    margin-bottom: 15px;
}

/* 📝 INPUT */
input {
    width: 90%;
    padding: 12px;
    background: black;
    border: 2px solid #66ccff;
    color: #bfefff;
}

/* 🚀 BUTTON */
button {
    margin-top: 10px;
    padding: 10px 20px;
    background: linear-gradient(90deg,#ffd700,#ff9966);
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px #ffd700;
}

/* 📦 OUTPUT */
pre {
    margin-top: 15px;
    text-align: left;
    background: black;
    padding: 10px;
    border: 1px solid #66ccff;
    height: 150px;
    overflow: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
<div class="card">

    <!-- 🌌 LOGO + ORBIT -->
    <div class="logo-wrap">

        <img src="logo.png" class="logo">

        <div class="orbit">
            <div class="planet"></div>
        </div>

        <div class="orbit2">
            <div class="planet2"></div>
        </div>

    </div>

    <h1>King Diadem</h1>
    <div class="status">❌ เครดิตหมด (AI ถูกจำกัด)</div>

    <input id="input" placeholder="พิมพ์สถานการณ์...">
    <br>
    <button onclick="run()">RUN DECISION ENGINE</button>

    <pre id="output">System Ready</pre>

</div>
</div>

<script>
async function run() {

    const text = document.getElementById("input").value;

    document.getElementById("output").innerText = "Running...";

    const res = await fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            input: text
        })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
