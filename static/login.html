<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — KING DIADEM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000510;color:#a8d4e8;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nebula{position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 50%,rgba(255,80,0,0.08),transparent 60%),radial-gradient(ellipse 50% 60% at 80% 40%,rgba(0,100,255,0.10),transparent 60%);pointer-events:none;}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.01) 2px,rgba(0,212,255,0.01) 4px);pointer-events:none;}
.card{position:relative;z-index:10;width:380px;padding:36px;border-radius:6px;background:rgba(0,8,20,0.92);border:1px solid rgba(0,212,255,0.15);box-shadow:0 0 60px rgba(0,212,255,0.1);}
.logo-wrap{display:flex;justify-content:center;margin-bottom:20px;}
.logo-wrap img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(0,212,255,0.5));}
.title{font-family:'Cinzel',serif;font-size:18px;letter-spacing:4px;text-align:center;background:linear-gradient(90deg,#c8a96e,#ffd27f,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.sub{font-size:9px;letter-spacing:2px;color:rgba(0,212,255,0.3);text-align:center;margin-bottom:28px;}
.field{margin-bottom:14px;}
.field label{font-size:8px;letter-spacing:2px;color:rgba(0,212,255,0.4);display:block;margin-bottom:6px;}
.field input{width:100%;padding:10px 14px;background:rgba(0,8,20,0.9);border:1px solid rgba(0,212,255,0.15);border-radius:3px;color:#cdefff;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;}
.field input:focus{border-color:rgba(0,212,255,0.4);}
.btn{width:100%;padding:12px;border:none;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-bottom:10px;}
.btn-primary{background:linear-gradient(135deg,rgba(200,169,110,0.2),rgba(255,210,127,0.1));border:1px solid rgba(200,169,110,0.3);color:#ffd27f;}
.btn-primary:hover{border-color:#c8a96e;box-shadow:0 0 20px rgba(200,169,110,0.2);}
.btn-google{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#cdefff;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);}
.btn-google img{width:16px;height:16px;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:8px;color:rgba(0,212,255,0.2);letter-spacing:2px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(0,212,255,0.1);}
.back{text-align:center;margin-top:16px;font-size:9px;color:rgba(0,212,255,0.3);}
.back a{color:rgba(0,212,255,0.5);text-decoration:none;}
.back a:hover{color:#00d4ff;}
.msg{font-size:10px;padding:8px;border-radius:3px;margin-bottom:12px;display:none;}
.msg.err{background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.2);color:#ff8f8f;}
.msg.ok{background:rgba(0,255,120,0.08);border:1px solid rgba(0,255,120,0.2);color:#00ff88;}
</style>
</head>
<body>
<div class="nebula"></div>
<div class="scanline"></div>
<div class="card">
  <div class="logo-wrap"><img src="/static/logo.png" alt="KD"></div>
  <div class="title">KING DIADEM</div>
  <div class="sub">GOVERNANCE OS · ACCESS PORTAL</div>
  <div class="msg" id="msg"></div>
  <div class="field"><label>EMAIL</label><input type="email" id="email" placeholder="your@email.com"></div>
  <div class="field"><label>PASSWORD</label><input type="password" id="password" placeholder="••••••••"></div>
  <button class="btn btn-primary" onclick="login()">▶ LOGIN</button>
  <button class="btn btn-primary" style="opacity:.7" onclick="register()">+ REGISTER</button>
  <div class="divider">OR</div>
  <button class="btn btn-google" onclick="googleLogin()">
    <img src="https://www.google.com/favicon.ico" alt="G">
    CONTINUE WITH GOOGLE
  </button>
  <div class="back"><a href="/">← กลับหน้าหลัก</a></div>
</div>
<script>
const urlParams=new URLSearchParams(location.search);
if(urlParams.get("error")){showMsg("เกิดข้อผิดพลาด: "+urlParams.get("error"),"err");}

function showMsg(txt,type){
  const el=document.getElementById("msg");
  el.textContent=txt;el.className="msg "+type;el.style.display="block";
}

async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  if(!email){showMsg("กรุณากรอก Email","err");return;}
  const res=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data=await res.json();
  if(data.status==="ok"){showMsg("เข้าสู่ระบบสำเร็จ ✓","ok");setTimeout(()=>location.href="/",800);}
  else showMsg("Email หรือ Password ไม่ถูกต้อง","err");
}

async function register(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  if(!email){showMsg("กรุณากรอก Email","err");return;}
  const res=await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data=await res.json();
  if(data.status==="ok"){showMsg("สมัครสำเร็จ ✓ ได้รับ 10 credits ฟรี","ok");setTimeout(()=>location.href="/",1000);}
  else showMsg("สมัครไม่สำเร็จ","err");
}

function googleLogin(){location.href="/login/google";}

document.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
</script>
</body>
</html>
