<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login - King Diadem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE SPACE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #e0f7ff;
    background: radial-gradient(circle at center, #020617, #000);
    overflow: hidden;
}

/* ⭐ STAR LAYERS */
.stars, .stars2, .stars3 {
    position: fixed;
    width: 200%;
    height: 200%;
    background-repeat: repeat;
    animation: moveStars linear infinite;
}

/* ⭐ layer 1 (ใกล้) */
.stars {
    background-image:
    radial-gradient(2px 2px at 20px 30px, white, transparent),
    radial-gradient(2px 2px at 100px 150px, white, transparent),
    radial-gradient(1px 1px at 200px 80px, white, transparent);
    animation-duration: 60s;
}

/* ⭐ layer 2 */
.stars2 {
    background-image:
    radial-gradient(1px 1px at 50px 60px, #aaa, transparent),
    radial-gradient(1px 1px at 150px 120px, #ddd, transparent);
    animation-duration: 120s;
}

/* ⭐ layer 3 (ไกล) */
.stars3 {
    background-image:
    radial-gradient(1px 1px at 80px 40px, #888, transparent),
    radial-gradient(1px 1px at 180px 200px, #bbb, transparent);
    animation-duration: 200s;
}

@keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-500px); }
}

/* 🌫 overlay glow */
.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center,
        rgba(0,255,255,0.05),
        rgba(0,0,0,0.9)
    );
}

/* 🧊 container */
.container {
    position: relative;
    max-width: 400px;
    margin: 120px auto;
    padding: 30px;

    background: rgba(10, 20, 30, 0.85);
    backdrop-filter: blur(20px);

    border-radius: 20px;
    border: 1px solid rgba(0,255,255,0.2);

    box-shadow: 0 0 40px rgba(0,255,255,0.15);
    z-index: 10;
}

/* 🔷 logo */
.logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 60px;
}

/* 🧠 title */
h1 {
    text-align: center;
    color: #00eaff;
}

/* ✍️ input */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    background: rgba(0,20,30,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 10px;

    color: #ccfaff;
}

/* 🔘 button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;

    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;

    background: linear-gradient(135deg, #00cfff, #0066ff);
    color: white;
}

button:hover {
    transform: scale(1.02);
}

/* 🔗 link */
.link {
    text-align: center;
    margin-top: 10px;
}

.link a {
    color: #00eaff;
    text-decoration: none;
}

</style>
</head>

<body>

<!-- 🌌 layers -->
<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>
<div class="overlay"></div>

<img src="/static/logo.png" class="logo">

<div class="container">

<h1>Login</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<div class="link">
<a href="/">← กลับหน้าหลัก</a>
</div>

</div>

<script>

async function login(){

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    })

    const data = await res.json()

    if(data.status==="ok"){
        localStorage.setItem("email", email)
        alert("Login สำเร็จ | เครดิต: " + data.credit)
        window.location.href = "/"
    }else{
        alert("Login ไม่สำเร็จ")
    }
}

async function register(){

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const res = await fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    })

    const data = await res.json()

    alert("สมัครแล้ว: " + JSON.stringify(data))
}

</script>

</body>
</html>
