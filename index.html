<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>KING DIADEM</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<canvas id="universe"></canvas>


<div class="wrapper">

<div class="panel">

<div class="title">KING DIADEM</div>

<div class="subtitle">
Strategic Civilization Engine
</div>


<input id="location" placeholder="Location">

<input id="food" placeholder="Food Level">

<input id="money" placeholder="Money">

<input id="risk" placeholder="Risk Level">


<button onclick="analyze()">

⚡ Analyze Situation

</button>



<div class="result" id="resultBox">

<div id="resultText"></div>

</div>


<div class="reason" id="reasonBox">

<b>Decision Reasoning</b>

<div id="reasonText"></div>

</div>


</div>



<div class="map">


<canvas id="brain"></canvas>



<div class="dashboard">

📊 Decision Dashboard

<br><br>

Survival Probability

<div class="meter">

<div class="meter-bar" id="probBar"></div>

</div>

<div id="probText">0%</div>

<br>

🌍 Global Node ONLINE

</div>



<div class="telemetry">

AI CORE STATUS

<br><br>

Entropy :
<span id="entropy">Stable</span>

<br>

Risk Level :
<span id="riskLevel">Low</span>

<br>

Simulation Cycles :
<span id="sim">128</span>

</div>


</div>


</div>


<script src="universe.js"></script>

<script src="ai_brain.js"></script>

<script src="decision.js"></script>


</body>

</html>
