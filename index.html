<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>KING DIADEM</title>

<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>KING DIADEM</h1>

<p>Decision System for Survival Strategy</p>

<input id="location" placeholder="Location">
<input id="food" placeholder="Meals Remaining">
<input id="money" placeholder="Money">
<input id="danger" placeholder="Danger Level">

<button onclick="run()">Run Decision</button>

<br><br>

<a href="FRONTEND/register.html">Register</a>
<br>
<a href="FRONTEND/login.html">Login</a>
<br>
<a href="FRONTEND/wallet.html">Top Up</a>


<script>

async function run(){

let location=document.getElementById("location").value
let food=document.getElementById("food").value
let money=document.getElementById("money").value
let danger=document.getElementById("danger").value


let res=await fetch(
"https://king-diadem.onrender.com/decision",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
location,
food,
money,
danger
})
})

let data=await res.json()

alert(data.result)

}

</script>

</body>
</html>
