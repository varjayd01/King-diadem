<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="/static/style.css">

<title>KING DIADEM</title>

</head>

<body>

<div class="container">

<img src="/static/icon-512.png" class="logo">

<h1>KING DIADEM</h1>

<div class="subtitle">
Decision Intelligence System
</div>

<input id="location" placeholder="Where are you now">

<input id="food" placeholder="Meals remaining">

<input id="money" placeholder="Money available">

<input id="danger" placeholder="Danger level (1-10)">

<button onclick="analyze()">Analyze Decision</button>

<div class="link">

<a href="/login.html">Login</a> •
<a href="/register.html">Create Account</a> •
<a href="/wallet.html">Top Up</a>

</div>

</div>

<script>

async function analyze(){

const data = {

location:document.getElementById("location").value,
food:document.getElementById("food").value,
money:document.getElementById("money").value,
danger:document.getElementById("danger").value

}

const res = await fetch("/decision",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

const result = await res.json()

alert(result.result)

}

</script>

</body>
</html>
