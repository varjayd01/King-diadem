<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KING DIADEM</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<canvas id="universe"></canvas>

<div class="panel">

<h1>KING DIADEM</h1>

<p class="tag">
You can stop here. No system will rush your decision.
</p>

<input id="location" placeholder="Where are you right now">

<input id="food" placeholder="Meals remaining">

<input id="money" placeholder="Money available">

<input id="risk" placeholder="Danger level">

<button onclick="analyze()">
Show possible choices
</button>

<button onclick="buyAccess()">
Unlock Strategic Engine
</button>

<div id="resultBox">
<div id="resultText"></div>
</div>

</div>

<div class="graph">

<h3>Simulation signal</h3>

<canvas id="simChart"></canvas>

</div>

<div class="footer">

Fail less. Harm less. Restore more.

</div>

<script src="universe.js"></script>
<script src="decision.js"></script>
<script src="simulation_graph.js"></script>
<script src="system_status.js"></script>

</body>
</html>
