<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING DIADEM</title>

<style>
:root {
    --primary:#00f2ff;
    --secondary:#7000ff;
    --bg:#020617;
    --glass:rgba(15,23,42,0.8);
    --border:rgba(255,255,255,0.1);
}

body{
    margin:0;
    font-family:Segoe UI;
    background:radial-gradient(circle,#1e1b4b,#020617);
    color:#fff;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    background:var(--glass);
}
h1{
    margin:0;
    letter-spacing:5px;
    background:linear-gradient(to right,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* CHAT */
#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.msg{
    padding:12px 18px;
    border-radius:15px;
    max-width:75%;
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,var(--secondary),#4f46e5);
}

.bot{
    align-self:flex-start;
    background:var(--glass);
    border:1px solid var(--border);
}

/* INPUT */
#input{
    padding:15px;
    display:flex;
    gap:10px;
    background:var(--glass);
}

input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    padding:0 20px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    cursor:pointer;
}

/* LOGIN PANEL */
#auth{
    display:flex;
    gap:5px;
    padding:10px;
    background:#000;
}

#auth input{
    width:120px;
}
</style>
</head>

<body>

<header>
<h1>👑 KING DIADEM</h1>
</header>

<!-- LOGIN -->
<div id="auth">
<input id="email" placeholder="email">
<input id="pass" placeholder="password">
<button onclick="signup()">SignUp</button>
<button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="chat">
<div class="msg bot">ระบบพร้อมใช้งาน</div>
</div>

<!-- INPUT -->
<div id="input">
<input id="msg" placeholder="พิมพ์คำสั่ง..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">EXECUTE</button>
</div>

<script>

/* SIGNUP */
async function signup(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    });

    const data = await res.json();

    localStorage.setItem("key",data.api_key);
    localStorage.setItem("credits",data.credits);

    alert("สมัครสำเร็จ");
}

/* LOGIN */
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    });

    const data = await res.json();

    localStorage.setItem("key",data.api_key);
    localStorage.setItem("credits",data.credits);

    alert("ล็อกอินสำเร็จ");
}

/* SEND */
async function send(){
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    const text = input.value.trim();
    if(!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value="";

    try{
        const res = await fetch("/decision",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "api_key":localStorage.getItem("key")||""
            },
            body:JSON.stringify({question:text})
        });

        const data = await res.json();

        const reply = data.response || data.msg || "no response";

        chat.innerHTML += `<div class="msg bot">${reply}</div>`;

    }catch(e){
        chat.innerHTML += `<div class="msg bot" style="color:red;">Backend error</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
