<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 30% 20%,#1b2f6b,#050b1a);
}

.container{
width:420px;
background:rgba(10,20,40,0.9);
border-radius:12px;
padding:30px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.title{
font-size:26px;
font-weight:bold;
}

.subtitle{
font-size:13px;
opacity:0.6;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#0e1a30;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#5865f2,#7d83ff);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.02);
}

.result{
margin-top:20px;
background:#0e1a30;
padding:15px;
border-radius:8px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="title">KING DIADEM</div>
<div class="subtitle">Global Decision Engine</div>

<input id="location" placeholder="Location">
<input id="food" placeholder="Food Level">
<input id="money" placeholder="Money">
<input id="risk" placeholder="Risk Level">

<button onclick="analyze()">⚡ Analyze Situation</button>

<div class="result" id="resultBox">
<div id="resultText"></div>
</div>

</div>

<script>

async function analyze(){

let location=document.getElementById("location").value
let food=document.getElementById("food").value
let money=document.getElementById("money").value
let risk=document.getElementById("risk").value

let box=document.getElementById("resultBox")
let text=document.getElementById("resultText")

box.style.display="block"
text.innerHTML="Analyzing..."

let url=`https://king-diadem.onrender.com/decision?location=${location}&food=${food}&money=${money}&risk=${risk}`

try{

let res=await fetch(url,{method:"POST"})
let data=await res.json()

let output=""

data.choices.forEach(c=>{
output+="• "+c+"<br><br>"
})

text.innerHTML=output

}catch(e){

text.innerHTML="System error"

}

}

</script>

</body>
</html>
