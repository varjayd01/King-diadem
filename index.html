<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING DIADEM | THE SOVEREIGN AI</title>
    <style>
        :root {
            --primary: #00f2ff; /* Cyber Blue */
            --secondary: #7000ff; /* Royal Purple */
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Background Animation Effects */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        #chat {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Scrollbar */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .msg {
            max-width: 80%;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            animation: fadeIn 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary), #4f46e5);
            color: white;
            border-bottom-right-radius: 2px;
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.2);
        }

        .bot {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
            backdrop-filter: blur(5px);
        }

        #input-container {
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 15px;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #020617;
            border: none;
            padding: 0 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }

        .status-dot {
            width: 8px; height: 8px; background: #22c55e;
            border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px #22c55e;
        }
    </style>
</head>
<body>

<header>
    <h1>👑 KING DIADEM</h1>
    <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">
        <span class="status-dot"></span> SYSTEM ACTIVE | KERNEL VER. 1.0.4
    </div>
</header>

<div id="chat">
    <div class="msg bot">สวัสดีค่ะจอมทัพ KING DIADEM พร้อมรับคำสั่งวิเคราะห์ข้อมูลแล้วค่ะ</div>
</div>

<div id="input-container">
    <div class="input-wrapper">
        <input type="text" id="msg-input" placeholder="ป้อนชุดข้อมูลหรือคำสั่งตรรกะ..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Execute</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("msg-input");
    const chat = document.getElementById("chat");
    const msg = input.value.trim();

    if (!msg) return;

    chat.innerHTML += `<div class="msg user">${msg}</div>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("/decision", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        chat.innerHTML += `<div class="msg bot"><b>RESULT:</b><br>${data.reply}</div>`;
    } catch (err) {
        chat.innerHTML += `<div class="msg bot" style="border-color: #ef4444; color: #f87171;">⚠️ CONNECTION INTERRUPTED: ตรวจสอบความเสถียรของ Backend</div>`;
    }
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
