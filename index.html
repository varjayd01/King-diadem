<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0b1730,#0a1f3f);
color:white;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:#16233b;
padding:35px;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.title{
font-size:26px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:6px;
background:#0d1a2f;
color:white;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#5a6cff,#7d83ff);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:25px;
background:#0d1a2f;
padding:15px;
border-radius:8px;
display:none;
}

.result h3{
margin-top:0;
font-size:14px;
opacity:0.8;
}

.loading{
text-align:center;
opacity:0.6;
}

</style>

</head>

<body>

<div class="container">

<div class="title">KING DIADEM</div>
<div class="subtitle">Global Decision Engine</div>

<input id="location" placeholder="Location">

<input id="food" placeholder="Food Level">

<input id="money" placeholder="Money">

<input id="risk" placeholder="Risk Level">

<button onclick="analyze()">⚡ Analyze Situation</button>

<div class="result" id="resultBox">
<h3>AI Strategic Output</h3>
<div id="resultText"></div>
</div>

</div>

<script>

async function analyze(){

let location=document.getElementById("location").value
let food=document.getElementById("food").value
let money=document.getElementById("money").value
let risk=document.getElementById("risk").value

let box=document.getElementById("resultBox")
let text=document.getElementById("resultText")

box.style.display="block"
text.innerHTML='<div class="loading">Analyzing...</div>'

let url=`https://king-diadem.onrender.com/decision?location=${location}&food=${food}&money=${money}&risk=${risk}`

try{

let res=await fetch(url)
let data=await res.json()

let output=""

data.choices.forEach(c=>{
output+="• "+c+"<br><br>"
})

text.innerHTML=output

}catch(e){

text.innerHTML="System error"

}

}

</script>

</body>
</html>
