<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at center,#0b1e3d,#050b1a);
color:white;
overflow:hidden;
}

#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.wrapper{
display:grid;
grid-template-columns:1fr 420px 1fr;
grid-template-rows:100vh;
gap:30px;
padding:30px;
}

.panel{
background:rgba(10,20,40,0.8);
border-radius:12px;
padding:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 50px rgba(0,0,0,0.6);
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
opacity:0.6;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#0d1a30;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#4f6cff,#7d8dff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#map{
height:400px;
border-radius:10px;
}

.reason{
margin-top:20px;
background:#0d1a30;
padding:15px;
border-radius:8px;
min-height:120px;
}

.dashboard{
font-size:14px;
line-height:1.7;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="wrapper">

<div class="panel">
<div class="title">🌍 Global Map</div>
<div id="map"></div>
</div>

<div class="panel">

<div class="title">KING DIADEM</div>
<div class="subtitle">Global Decision Engine</div>

<input id="location" placeholder="Location">
<input id="food" placeholder="Food Level">
<input id="money" placeholder="Money">
<input id="risk" placeholder="Risk Level">

<button onclick="analyze()">⚡ Analyze</button>

<div class="reason" id="result">
AI reasoning will appear here
</div>

</div>

<div class="panel">

<div class="title">🛰 Strategy Dashboard</div>

<div class="dashboard">

System Status: Online<br>
Decision Engine: Active<br>
Network: Global<br><br>

Entropy Monitor: Stable<br>
Resource Signal: Tracking<br>
Choice Engine: Running<br>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([13.7563,100.5018],4);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

async function analyze(){

let location=document.getElementById("location").value
let food=document.getElementById("food").value
let money=document.getElementById("money").value
let risk=document.getElementById("risk").value

let result=document.getElementById("result")

result.innerHTML="Analyzing..."

let url=`https://king-diadem.onrender.com/decision?location=${location}&food=${food}&money=${money}&risk=${risk}`

try{

let res=await fetch(url,{method:"POST"})
let data=await res.json()

let text="AI Strategic Output<br><br>"

data.choices.forEach(c=>{
text+="• "+c+"<br>"
})

result.innerHTML=text

}catch{

result.innerHTML="System error"

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>

tsParticles.load("particles",{
particles:{
number:{value:60},
size:{value:2},
move:{speed:1},
color:{value:"#7aa2ff"},
links:{enable:true,color:"#3a6cff"}
}
})

</script>

</body>
</html>
