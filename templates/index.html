<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>KING DIADEM</title>

<style>
body{
    margin:0;
    background:#343541;
    font-family:sans-serif;
    color:white;
}

#chat{
    height:85vh;
    overflow-y:auto;
    padding:20px;
}

.msg{
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.bot{
    background:#444654;
}

#input{
    display:flex;
    padding:10px;
    background:#40414f;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:5px;
}

button{
    margin-left:10px;
    padding:12px;
}
</style>
</head>

<body>

<div id="chat">
<div class="msg bot">ระบบพร้อมใช้งาน</div>
</div>

<div id="input">
<input id="msg" placeholder="พิมพ์..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">ส่ง</button>
</div>

<script>
async function send(){
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");

    const text = input.value.trim();
    if(!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value="";

    const res = await fetch("https://g-diadem.onrender.com/decision",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "api_key":localStorage.getItem("key") || ""
        },
        body:JSON.stringify({question:text})
    });

    const data = await res.json();

    chat.innerHTML += `<div class="msg bot">${data.response}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
