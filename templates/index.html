<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>King Diadem</title>
  <style>
    :root{
      --bg1:#04040a;
      --bg2:#0a1020;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:#f4f7ff;
      --muted:rgba(244,247,255,.72);
      --line:rgba(255,255,255,.14);
      --accent:#8b7dff;
      --accent2:#4dd7ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(77,215,255,.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(139,125,255,.18), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .stars, .stars:before, .stars:after{
      position:fixed; inset:0; content:"";
      background-image:
        radial-gradient(1px 1px at 10px 20px,#fff,transparent),
        radial-gradient(1px 1px at 80px 120px,#fff,transparent),
        radial-gradient(1px 1px at 140px 60px,#fff,transparent),
        radial-gradient(1px 1px at 220px 180px,#fff,transparent),
        radial-gradient(1px 1px at 300px 90px,#fff,transparent),
        radial-gradient(1px 1px at 380px 200px,#fff,transparent),
        radial-gradient(1px 1px at 460px 40px,#fff,transparent);
      background-size:520px 260px;
      opacity:.45;
      animation: drift 28s linear infinite;
      pointer-events:none;
    }
    .stars:before{transform:translateY(-120px); opacity:.25}
    .stars:after{transform:translateY(120px); opacity:.18}
    @keyframes drift { from{transform:translateY(0)} to{transform:translateY(260px)} }

    .wrap{
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:14px 14px 18px;
      gap:12px;
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:18px;
      backdrop-filter: blur(16px);
    }
    .brand{font-weight:700; letter-spacing:.2px}
    .small{font-size:12px; color:var(--muted)}
    .ghost{
      width:42px;height:42px;border-radius:50%;
      border:1px solid var(--line);
      background:rgba(255,255,255,.07);
      color:var(--text);
      font-size:20px;
    }
    .chat{
      flex:1;
      overflow:auto;
      padding:4px 2px 6px;
    }
    .msg{
      max-width:84%;
      margin:10px 0;
      padding:12px 14px;
      border-radius:18px;
      line-height:1.45;
      font-size:16px;
      border:1px solid var(--line);
      backdrop-filter: blur(14px);
      white-space:pre-wrap;
      word-wrap:break-word;
    }
    .me{
      margin-left:auto;
      background:linear-gradient(180deg, rgba(139,125,255,.28), rgba(77,215,255,.18));
      border-top-right-radius:8px;
    }
    .bot{
      margin-right:auto;
      background:rgba(255,255,255,.07);
      border-top-left-radius:8px;
    }
    .composer{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      background:rgba(255,255,255,.07);
      border:1px solid var(--line);
      border-radius:24px;
      backdrop-filter: blur(16px);
    }
    .plus{
      width:46px;height:46px;border:none;border-radius:50%;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      color:var(--text);
      font-size:26px;
      flex:0 0 auto;
    }
    input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:16px;
      padding:12px 2px;
    }
    input::placeholder{color:rgba(244,247,255,.45)}
    .send{
      border:none;
      padding:12px 16px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#06111c;
      font-weight:700;
    }
    .fabline{
      display:flex; align-items:center; justify-content:space-between;
      color:var(--muted);
      font-size:12px;
      padding:0 4px;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="brand">King Diadem</div>
        <div class="small">cosmic chat shell</div>
      </div>
      <button class="ghost" id="menuBtn">⋯</button>
    </div>

    <div class="chat" id="chat">
      <div class="msg bot">สวัสดีครับ พิมพ์มาได้เลย 🌌</div>
    </div>

    <div class="fabline">
      <span>minimal UI</span>
      <span>one button, one mind</span>
    </div>

    <form class="composer" id="form">
      <button class="plus" type="button" id="plusBtn">+</button>
      <input id="input" placeholder="Ask anything" autocomplete="off" />
      <button class="send" type="submit">ส่ง</button>
    </form>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const plusBtn = document.getElementById('plusBtn');

    function addMsg(text, cls){
      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    async function send(text){
      addMsg(text, 'me');
      const typing = addMsg('...', 'bot');
      try{
        const res = await fetch('/api/think', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({message:text})
        });
        const data = await res.json();
        typing.textContent = data.reply || 'ไม่มีคำตอบ';
      }catch(e){
        typing.textContent = 'เชื่อม backend ไม่ได้';
      }
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const text = input.value.trim();
      if(!text) return;
      input.value = '';
      send(text);
    });

    plusBtn.addEventListener('click', ()=>{
      input.value = input.value ? input.value + ' +' : '+';
      input.focus();
    });
  </script>
</body>
  </html>
