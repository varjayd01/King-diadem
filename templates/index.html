<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KING DIADEM</title>

<link rel="stylesheet" href="/static/style.css">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0b1220, #020617);
    color: white;
    font-family: Arial, sans-serif;
}

.app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: rgba(10,10,20,0.9);
    padding: 10px;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar button {
    width: 100%;
    padding: 10px;
    background: #2563eb;
    border: none;
    color: white;
    cursor: pointer;
    margin-bottom: 10px;
    border-radius: 8px;
}

#chatList div {
    padding: 8px;
    cursor: pointer;
    border-radius: 6px;
}

#chatList div:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* CHAT */
#chatBox {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.ai {
    background: #10b981;
    align-self: flex-start;
}

/* INPUT */
.inputArea {
    display: flex;
    padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button.send {
    margin-left: 10px;
    padding: 10px 20px;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <button id="newChatBtn">+ New Chat</button>
        <div id="chatList"></div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            👑 KING DIADEM
        </div>

        <div id="chatBox"></div>

        <div class="inputArea">
            <input id="input" placeholder="พิมพ์ข้อความ..." />
            <button class="send" id="sendBtn">Send</button>
        </div>

    </div>

</div>

<!-- JS -->
<script>
console.log("KING DIADEM UI READY 🔥")

let chat_id = null

window.onload = async () => {
    document.getElementById("newChatBtn").onclick = createChat
    document.getElementById("sendBtn").onclick = send

    await createChat()
}

async function createChat() {
    const res = await fetch('/new_chat', { method: 'POST' })
    const data = await res.json()

    chat_id = data.chat_id

    document.getElementById("chatBox").innerHTML = ""
}

async function send() {
    const input = document.getElementById("input")
    const text = input.value

    if (!text) return

    add("user", text)

    const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            question: text,
            chat_id: chat_id
        })
    })

    const data = await res.json()

    add("ai", data.answer)

    input.value = ""
}

function add(role, text) {
    const box = document.getElementById("chatBox")

    const div = document.createElement("div")
    div.className = "msg " + role
    div.innerText = text

    box.appendChild(div)

    box.scrollTop = box.scrollHeight
}
</script>

</body>
</html>
