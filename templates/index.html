<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>King Diadem</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
}

.chat {
  height:80vh;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.me { background:#4dd7ff; color:black; text-align:right }
.bot { background:#222 }

.form {
  display:flex;
}

input {
  flex:1;
  padding:10px;
}

button {
  padding:10px;
}
</style>
</head>

<body>

<h2>King Diadem</h2>

<div id="chat" class="chat">
  <div class="msg bot">สวัสดีครับ พิมพ์มาได้เลย</div>
</div>

<form id="form" class="form">
  <input id="input" placeholder="พิมพ์..." />
  <button type="submit">ส่ง</button>
</form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

function add(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

form.onsubmit = async (e)=>{
  e.preventDefault();

  const text = input.value;
  if(!text) return;

  input.value = "";

  add(text, "me");
  const typing = add("...", "bot");

  try {
    const res = await fetch("/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    typing.innerText = data.reply;

  } catch(e) {
    typing.innerText = "error";
  }
}
</script>

</body>
</html>
