<!DOCTYPE html>
<html>
<head>
    <title>KING DIADEM (Public)</title>
</head>
<body>

<h1>Public Access</h1>

<input id="input" />
<button onclick="send()">Send</button>

<p id="result"></p>

<script>
async function send() {
    const input = document.getElementById("input").value;

    const res = await fetch("https://king-diadem.onrender.com/api/decision", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ input })
    });

    const data = await res.json();

    document.getElementById("result").innerText = data.output;
}
</script>

</body>
</html>
